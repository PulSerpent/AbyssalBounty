<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Abyssal Bounty</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        body { 
            overscroll-behavior-y: none; -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; touch-action: manipulation; background-color: #020617; 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: white;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-pt { padding-top: max(var(--safe-top), 1rem); }
        .safe-pb { padding-bottom: max(var(--safe-bottom), 1.5rem); }
        @keyframes float-up { 0% { transform: translateY(110vh) scale(0.5); opacity: 0; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }
        .bubble { animation: float-up linear infinite; position: absolute; border-radius: 50%; background: rgba(255,255,255,0.1); pointer-events: none; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#020617; color:#22d3ee; font-weight:bold; font-family:sans-serif;">
            <div style="font-size:32px; margin-bottom:15px;">⚓</div>
            <div>Diving into the Abyss...</div>
        </div>
    </div>

    <script type="text/babel">

        // --- HARDCODED ICONS (Crash-Proof) ---
        const Icon = ({ name, size = 16, className = "" }) => {

                Flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
                Crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/>,

                Skull: <><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2 M12.5 17l-.5-1-.5 1h1z M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></>,
                Eye: <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                Moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>,
                MousePointer2: <path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/>,
                Copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
                Info: <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4 M12 8h.01"/></>,
                BoxSelect: <path d="M5 3a2 2 0 0 0-2 2 M19 3a2 2 0 0 1 2 2 M21 19a2 2 0 0 1-2 2 M5 21a2 2 0 0 1-2-2 M9 3h1 M9 21h1 M14 3h1 M14 21h1 M3 9v1 M21 9v1 M3 14v1 M21 14v1"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                Compass: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>,
                Wand2: <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z M14 7l3 3 M5 6v4 M19 14v4 M10 2v2 M7 8H3 M21 16h-4 M11 3H9"/>,
                Percent: <><line x1="19" x2="5" y1="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></>,
                Calculator: <><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01 M12 10h.01 M8 10h.01 M12 14h.01 M8 14h.01 M12 18h.01 M8 18h.01"/></>,
                BookOpen: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"/>}
                </svg>
            );
        };

        const formatNum = (num) => {
            if (num === undefined || num === null || isNaN(num)) return "0";
            if (num < 1000) return Math.floor(num).toString();
            if (num < 1000000) return (num / 1000).toFixed(1) + 'k';
            if (num < 1000000000) return (num / 1000000).toFixed(2) + 'M';
            if (num < 1000000000000) return (num / 1000000000).toFixed(2) + 'B';
            return (num / 1000000000000).toFixed(2) + 'T';
        };

        // --- MASSIVE EXPANDED CONSTANTS ---
        const RARITIES = [
            { id: 'trash', label: 'Trash', color: 'text-stone-500', bg: 'bg-stone-200/90', multiplier: 0.5, incomeBase: 0.05 },
            { id: 'common', label: 'Common', color: 'text-zinc-400', bg: 'bg-zinc-800/90', multiplier: 1, incomeBase: 0.2 },
            { id: 'uncommon', label: 'Uncommon', color: 'text-teal-400', bg: 'bg-teal-900/90', multiplier: 3, incomeBase: 1.0 },
            { id: 'rare', label: 'Rare', color: 'text-sky-400', bg: 'bg-sky-900/90', multiplier: 8, incomeBase: 4.5 },
            { id: 'epic', label: 'Epic', color: 'text-indigo-400', bg: 'bg-indigo-900/90', multiplier: 20, incomeBase: 18.0 },
            { id: 'legendary', label: 'Legendary', color: 'text-amber-400', bg: 'bg-amber-900/90', multiplier: 60, incomeBase: 80.0 },
            { id: 'mythic', label: 'Mythic', color: 'text-rose-400', bg: 'bg-rose-900/90', multiplier: 200, incomeBase: 350.0 },
            { id: 'celestial', label: 'Celestial', color: 'text-cyan-300', bg: 'bg-cyan-900/90', multiplier: 800, incomeBase: 2000.0 },
            { id: 'primordial', label: 'Primordial', color: 'text-fuchsia-500', bg: 'bg-fuchsia-900/90', multiplier: 3500, incomeBase: 15000.0 },
            { id: 'transcendent', label: 'Transcendent', color: 'text-yellow-300', bg: 'bg-slate-900/90', multiplier: 15000, incomeBase: 100000.0 },
        ];

        const MUTATION_ORDER = ['none', 'glimmering', 'bioluminescent', 'cursed', 'abyssal', 'void_touched', 'prismatic', 'ethereal'];
        
        const MUTATIONS = {
            none: { label: '', mult: 1, color: 'text-slate-900', bg: 'bg-white/90', glow: '' },
            glimmering: { label: 'Glimmering', mult: 1.5, color: 'text-yellow-500', bg: 'bg-yellow-50/90', glow: 'shadow-[0_0_10px_rgba(234,179,8,0.3)]' },
            bioluminescent: { label: 'Bioluminescent', mult: 3, color: 'text-lime-500', bg: 'bg-lime-50/90', glow: 'shadow-[0_0_15px_rgba(132,204,22,0.4)]' },
            cursed: { label: 'Cursed', mult: 7, color: 'text-red-700', bg: 'bg-red-50/90', glow: 'shadow-[0_0_15px_rgba(185,28,28,0.5)]' },
            abyssal: { label: 'Abyssal', mult: 15, color: 'text-violet-700', bg: 'bg-violet-100/90', glow: 'shadow-[0_0_15px_rgba(109,40,217,0.4)]' },
            void_touched: { label: 'Void-Touched', mult: 35, color: 'text-slate-800', bg: 'bg-slate-300/90', glow: 'shadow-[0_0_20px_rgba(30,41,59,0.7)]' },
            prismatic: { label: 'Prismatic', mult: 100, color: 'text-fuchsia-500', bg: 'bg-fuchsia-50/90', glow: 'shadow-[0_0_20px_rgba(217,70,239,0.5)]' },
            ethereal: { label: 'Ethereal', mult: 500, color: 'text-cyan-200', bg: 'bg-white/95', glow: 'shadow-[0_0_30px_rgba(165,243,252,0.8)]' }
        };

        const MASTER_ITEM_DB = [
            { name: "Soggy Seaweed", rid: "trash" }, { name: "Empty Can", rid: "trash" }, { name: "Waterlogged Boot", rid: "trash" }, { name: "Rusty Nail", rid: "trash" }, { name: "Muck Pile", rid: "trash" },
            { name: "Soggy Driftwood", rid: "common" }, { name: "Torn Fishing Net", rid: "common" }, { name: "Dull Sea Glass", rid: "common" }, { name: "Rusty Fishhook", rid: "common" }, { name: "Kelp Frond", rid: "common" },
            { name: "Shark Tooth", rid: "uncommon" }, { name: "Coral Branch", rid: "uncommon" }, { name: "Iron Anchor Link", rid: "uncommon" }, { name: "Sunken Compass", rid: "uncommon" }, { name: "Sailor's Flask", rid: "uncommon" },
            { name: "Glowing Urchin", rid: "rare" }, { name: "Anglerfish Lure", rid: "rare" }, { name: "Merfolk Dagger", rid: "rare" }, { name: "Shipwheel Spoke", rid: "rare" }, { name: "Aquamarine Shard", rid: "rare" },
            { name: "Kraken Tentacle", rid: "epic" }, { name: "Triton's Conch", rid: "epic" }, { name: "Abyssal Lantern", rid: "epic" }, { name: "Whirlpool Core", rid: "epic" }, { name: "Captain's Logbook", rid: "epic" },
            { name: "Heart of the Ocean", rid: "legendary" }, { name: "Poseidon's Trident", rid: "legendary" }, { name: "Megalodon Fang", rid: "legendary" }, { name: "Siren's Tear", rid: "legendary" }, { name: "Tidal Anchor", rid: "legendary" },
            { name: "Leviathan Engine", rid: "mythic" }, { name: "Oceanic Singularity", rid: "mythic" }, { name: "Breath of the Sea", rid: "mythic" }, { name: "Abyssal Pulse", rid: "mythic" }, { name: "Trench Behemoth Core", rid: "mythic" },
            { name: "Stardust Coral", rid: "celestial" }, { name: "Astral Pearl", rid: "celestial" }, { name: "Moon-Tide Amulet", rid: "celestial" }, { name: "Zodiac Compass", rid: "celestial" }, { name: "Solar Flare Relic", rid: "celestial" },
            { name: "Genesis Drop", rid: "primordial" }, { name: "Sunken Yggdrasil Root", rid: "primordial" }, { name: "The First Tear", rid: "primordial" }, { name: "Core of the Earth", rid: "primordial" }, { name: "Precursor Fragment", rid: "primordial" },
            { name: "Time-Lost Anchor", rid: "transcendent" }, { name: "Reality Shard", rid: "transcendent" }, { name: "The Infinite Ocean", rid: "transcendent" }, { name: "Whisper of the Cosmos", rid: "transcendent" }, { name: "Eternity Prism", rid: "transcendent" }
        ];

        const STANDARD_PACKS = [
            { id: 'flotsam', name: 'Flotsam Crate', cost: 0, currency: 'dubloon', icon: 'Waves', weights: { trash: 70, common: 29.5, uncommon: 0.5 }, pearlChance: 0.0001 },
            { id: 'driftwood', name: 'Driftwood Box', cost: 500, currency: 'dubloon', icon: 'Box', weights: { trash: 20, common: 60, uncommon: 18, rare: 2 }, pearlChance: 0.001 },
            { id: 'sunken', name: 'Sunken Chest', cost: 5000, currency: 'dubloon', icon: 'Anchor', weights: { common: 30, uncommon: 50, rare: 18, epic: 2 }, pearlChance: 0.005 },
            { id: 'coral', name: 'Coral Strongbox', cost: 75000, currency: 'dubloon', icon: 'Gem', weights: { uncommon: 40, rare: 45, epic: 14, legendary: 1 }, pearlChance: 0.02 },
            { id: 'trench', name: 'Trench Cache', cost: 1500000, currency: 'dubloon', icon: 'Fish', weights: { rare: 50, epic: 40, legendary: 9, mythic: 1 }, pearlChance: 0.05 },
            { id: 'galleon', name: 'Galleon Vault', cost: 40000000, currency: 'dubloon', icon: 'Ship', weights: { epic: 60, legendary: 30, mythic: 9, celestial: 1 }, pearlChance: 0.15 },
            { id: 'leviathan', name: 'Leviathan Hoard', cost: 1500000000, currency: 'dubloon', icon: 'Shield', weights: { legendary: 60, mythic: 30, celestial: 9, primordial: 1 }, pearlChance: 0.4 },
            { id: 'abyssal_reliquary', name: 'Abyssal Reliquary', cost: 85000000000, currency: 'dubloon', icon: 'Flame', weights: { mythic: 60, celestial: 30, primordial: 9.9, transcendent: 0.1 }, pearlChance: 0.8 },
            { id: 'atlantis', name: 'Atlantis Core', cost: 5000000000000, currency: 'dubloon', icon: 'Crown', weights: { celestial: 50, primordial: 45, transcendent: 5 }, pearlChance: 1.0 },
        ];

        const MUTATION_PACKS = [
            { id: 'glimmer_pack', name: 'Glimmering Shard', cost: 100, currency: 'pearl', icon: 'Sparkles', mutation: 'glimmering', desc: 'Mutate an artifact (1.5x).' },
            { id: 'bio_pack', name: 'Bioluminescence', cost: 500, currency: 'pearl', icon: 'Zap', mutation: 'bioluminescent', desc: 'Mutate an artifact (3x).' },
            { id: 'curse_pack', name: 'Dark Curse', cost: 2500, currency: 'pearl', icon: 'Skull', mutation: 'cursed', desc: 'Mutate an artifact (7x).' },
            { id: 'abyssal_pack', name: 'Abyssal Depths', cost: 15000, currency: 'pearl', icon: 'Droplet', mutation: 'abyssal', desc: 'Mutate an artifact (15x).' },
            { id: 'void_pack', name: 'Void Touch', cost: 100000, currency: 'pearl', icon: 'Eye', mutation: 'void_touched', desc: 'Mutate an artifact (35x).' },
            { id: 'prism_pack', name: 'Prismatic Tide', cost: 1000000, currency: 'pearl', icon: 'Star', mutation: 'prismatic', desc: 'Mutate an artifact (100x).' },
            { id: 'ethereal_pack', name: 'Ethereal Ascension', cost: 25000000, currency: 'pearl', icon: 'Moon', mutation: 'ethereal', desc: 'Mutate an artifact (500x).' },
        ];

        // --- COMPONENTS ---
        const OceanBackground = () => (
            <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden bg-gradient-to-b from-cyan-900 via-blue-950 to-slate-950">
                {[...Array(15)].map((_, i) => (
                    <div key={i} className="bubble" style={{ left: `${Math.random() * 100}vw`, width: `${Math.random() * 15 + 5}px`, height: `${Math.random() * 15 + 5}px`, animationDuration: `${Math.random() * 5 + 5}s`, animationDelay: `${Math.random() * 5}s` }} />
                ))}
            </div>
        );

        const App = () => {
            const [dubloons, setDubloons] = useState(100);
            const [pearls, setPearls] = useState(0);
            const [inventory, setInventory] = useState([]);
            const [discoveredNames, setDiscoveredNames] = useState([]);
            const [lastPull, setLastPull] = useState(null);
            const [view, setView] = useState('shop');
            const [upgrades, setUpgrades] = useState({ luck: 0, discount: 0, multiplier: 1 });
            
            const [isOpening, setIsOpening] = useState(false);
            const [isSealed, setIsSealed] = useState(false);
            const [isRipping, setIsRipping] = useState(false);
            const [activePack, setActivePack] = useState(null);
            const [pendingLoot, setPendingLoot] = useState(null);

            // Safe Load
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('abyssal_v4_expanded');
                    if (saved) {
                        const d = JSON.parse(saved);
                        if(d.dubloons !== undefined) setDubloons(d.dubloons);
                        if(d.pearls !== undefined) setPearls(d.pearls);
                        if(d.inventory) setInventory(d.inventory);
                        if(d.discoveredNames) setDiscoveredNames(d.discoveredNames);
                        if(d.upgrades) setUpgrades(d.upgrades);
                    }
                } catch(e) { console.error("Save Load Error", e); }
            }, []);

            // Safe Save
            useEffect(() => {
                localStorage.setItem('abyssal_v4_expanded', JSON.stringify({ dubloons, pearls, inventory, discoveredNames, upgrades }));
            }, [dubloons, pearls, inventory, discoveredNames, upgrades]);

            // Passive Income Calculation
            const incomeFlow = useMemo(() => {
                const bestItems = {};
                inventory.forEach(item => {
                    const currentBest = bestItems[item.name];
                    if (!currentBest || MUTATION_ORDER.indexOf(item.mutation || 'none') > MUTATION_ORDER.indexOf(currentBest.mutation || 'none')) {
                        bestItems[item.name] = item;
                    }
                });
                return Object.values(bestItems).reduce((acc, item) => {
                    const mult = MUTATIONS[item.mutation || 'none'].mult;
                    const val = item.cps * mult;
                    if (item.currency === 'pearl') acc.pearls += val;
                    else acc.dubloons += val;
                    return acc;
                }, { dubloons: 0, pearls: 0 });
            }, [inventory]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setDubloons(d => d + (incomeFlow.dubloons * upgrades.multiplier / 10));
                    setPearls(p => p + (incomeFlow.pearls * upgrades.multiplier / 10));
                }, 100);
                return () => clearInterval(timer);
            }, [incomeFlow, upgrades.multiplier]);

            const getPackCost = (p) => p.currency === 'dubloon' ? Math.floor(p.cost * (1 - (upgrades.discount * 0.05))) : p.cost;

            const openPack = (pack) => {
                const cost = getPackCost(pack);
                if ((pack.currency === 'dubloon' ? dubloons : pearls) < cost) return;

                setIsOpening(true);
                setIsSealed(false);
                setLastPull(null);
                setActivePack(pack);

                if (pack.currency === 'dubloon') setDubloons(d => d - cost);
                else setPearls(p => p - cost);

                setTimeout(() => {
                    let rarity, mutation = pack.mutation || 'none';
                    if (pack.mutation) {
                        const pool = discoveredNames.length ? discoveredNames : MASTER_ITEM_DB.map(i => i.name);
                        const name = pool[Math.floor(Math.random() * pool.length)];
                        rarity = RARITIES.find(r => r.id === MASTER_ITEM_DB.find(i => i.name === name).rid);
                        setPendingLoot(createItem(name, rarity, mutation, pack));
                    } else {
                        const weights = { ...pack.weights };
                        if (upgrades.luck > 0) {
                            const shift = upgrades.luck * 2;
                            if (weights.trash > 0) weights.trash = Math.max(0, weights.trash - shift);
                            if (weights.common > 0) weights.common = Math.max(0, weights.common - shift * 0.5);
                            const keys = Object.keys(weights);
                            const top = keys[keys.length - 1];
                            const second = keys.length > 1 ? keys[keys.length - 2] : null;
                            if (second) weights[second] += shift * 0.5;
                            if (top) weights[top] += shift * 0.2;
                        }
                        
                        const total = Object.values(weights).reduce((a, b) => a + b, 0);
                        let rand = Math.random() * total;
                        rarity = RARITIES[0];
                        for (const r of [...RARITIES].reverse()) {
                            const w = weights[r.id] || 0;
                            if (w > 0 && rand < w) { rarity = r; break; }
                            rand -= w;
                        }
                        const items = MASTER_ITEM_DB.filter(i => i.rid === rarity.id);
                        const item = items[Math.floor(Math.random() * items.length)];
                        setPendingLoot(createItem(item.name, rarity, 'none', pack));
                    }
                    setIsOpening(false);
                    setIsSealed(true);
                }, 600);
            };

            const createItem = (name, rarity, mutation, pack) => {
                const highTier = ['celestial', 'primordial', 'transcendent'].includes(rarity.id);
                let currency = highTier ? 'pearl' : 'dubloon';
                if (currency === 'dubloon' && !pack.mutation && Math.random() < (pack.pearlChance || 0)) currency = 'pearl';

                const tierMult = STANDARD_PACKS.findIndex(p => p.id === pack.id) + 1 || 10;
                const cpsBase = rarity.incomeBase * (0.8 + Math.random() * 0.4) * (tierMult * 0.2 + 0.8);
                const cps = currency === 'pearl' ? parseFloat((cpsBase / 50).toFixed(3)) : parseFloat(cpsBase.toFixed(2));
                const isDup = inventory.some(i => i.name === name && i.mutation === mutation && i.currency === currency);
                
                return {
                    id: Date.now() + Math.random(),
                    name, rarity, mutation, currency, cps,
                    value: Math.floor(cps * 50),
                    isDup,
                    isInfused: currency === 'pearl' && !highTier
                };
            };

            const ripTape = () => {
                if (isRipping) return;
                setIsRipping(true);
                setTimeout(() => {
                    setInventory(prev => [pendingLoot, ...prev]);
                    if (!discoveredNames.includes(pendingLoot.name)) {
                        setDiscoveredNames(prev => [...prev, pendingLoot.name]);
                    }
                    setLastPull(pendingLoot);
                    setPendingLoot(null);
                    setIsSealed(false);
                    setIsRipping(false);
                }, 350);
            };

            const sellItem = (item) => {
                const mult = MUTATIONS[item.mutation || 'none'].mult;
                const total = item.value * mult;
                if (item.currency === 'pearl') setPearls(p => p + total);
                else setDubloons(d => d + total);
                setInventory(inv => inv.filter(i => i.id !== item.id));
                if (lastPull?.id === item.id) setLastPull(null);
            };

            const buyUpgrade = (type) => {
                const cost = type === 'luck' ? (upgrades.luck + 1) * 500 : 
                            type === 'discount' ? (upgrades.discount + 1) * 1000 : 
                            upgrades.multiplier * 2500;
                if (pearls < cost) return;
                setPearls(p => p - cost);
                setUpgrades(u => ({ ...u, [type]: type === 'multiplier' ? u.multiplier + 0.5 : u[type] + 1 }));
            };

            const getPackStyles = (packId) => {
                if(packId === 'driftwood') return { bg: 'bg-gradient-to-b from-orange-800 to-amber-950', seal: 'bg-amber-950', text: 'text-amber-200' };
                if(packId === 'sunken') return { bg: 'bg-gradient-to-b from-slate-600 to-slate-800', seal: 'bg-slate-900', text: 'text-slate-300' };
                if(packId === 'coral') return { bg: 'bg-gradient-to-b from-rose-500 to-pink-800', seal: 'bg-rose-950', text: 'text-rose-200' };
                if(packId === 'trench') return { bg: 'bg-gradient-to-b from-blue-700 to-indigo-900', seal: 'bg-indigo-950', text: 'text-blue-200' };
                if(packId === 'galleon') return { bg: 'bg-gradient-to-b from-amber-500 to-yellow-700', seal: 'bg-amber-900', text: 'text-amber-100' };
                if(packId === 'leviathan') return { bg: 'bg-gradient-to-b from-teal-600 to-cyan-900', seal: 'bg-cyan-950', text: 'text-teal-200' };
                if(packId === 'abyssal_reliquary') return { bg: 'bg-gradient-to-br from-violet-900 to-black', seal: 'bg-black', text: 'text-violet-400' };
                if(packId === 'atlantis') return { bg: 'bg-gradient-to-br from-yellow-300 via-amber-500 to-yellow-700', seal: 'bg-amber-950', text: 'text-yellow-100' };
                return { bg: 'bg-slate-700', seal: 'bg-slate-900', text: 'text-white' };
            };

            const sellAllDuplicates = () => {
                let newDubloons = dubloons;
                let newPearls = pearls;
                const newInventory = [];
                const grouped = {};
                
                inventory.forEach(item => {
                    if (!grouped[item.name]) grouped[item.name] = [];
                    grouped[item.name].push(item);
                });
                
                Object.values(grouped).forEach(group => {
                    group.sort((a,b) => MUTATION_ORDER.indexOf(b.mutation || 'none') - MUTATION_ORDER.indexOf(a.mutation || 'none'));
                    newInventory.push(group[0]); 
                    
                    for (let i = 1; i < group.length; i++) {
                        const dup = group[i];
                        const val = dup.value * MUTATIONS[dup.mutation || 'none'].mult;
                        if(dup.currency === 'pearl') newPearls += val;
                        else newDubloons += val;
                    }
                });
                
                setDubloons(newDubloons);
                setPearls(newPearls);
                setInventory(newInventory);
            };

            const actStyles = activePack ? getPackStyles(activePack.id) : getPackStyles('flotsam');

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-slate-950 relative">
                    <OceanBackground />
                    
                    <nav className="p-4 bg-white/10 backdrop-blur-xl border-b border-white/10 safe-pt flex justify-between items-center z-20">
                        <div className="space-y-1">
                            <div className="flex items-center gap-2 bg-slate-900/80 px-3 py-1 rounded-full border border-white/5 w-36">
                                <Icon name="Coins" size={14} className="text-amber-400 shrink-0" />
                                <span className="text-xs font-black truncate">{formatNum(dubloons)}</span>
                                <span className="text-[8px] text-teal-400 font-bold shrink-0">+{formatNum(incomeFlow.dubloons)}/s</span>
                            </div>
                            <div className="flex items-center gap-2 bg-slate-900/80 px-3 py-1 rounded-full border border-white/5 w-36">
                                <Icon name="Droplet" size={14} className="text-cyan-400 shrink-0" />
                                <span className="text-xs font-black truncate">{formatNum(pearls)}</span>
                                <span className="text-[8px] text-cyan-400 font-bold shrink-0">+{formatNum(incomeFlow.pearls)}/s</span>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] font-black uppercase opacity-40">Abyssal Bounty</div>
                            <div className="text-[9px] font-black text-teal-400 flex items-center justify-end gap-1"><Icon name="Zap" size={10}/> x{upgrades.multiplier.toFixed(1)} POWER</div>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto max-w-md mx-auto w-full p-4 flex flex-col no-scrollbar z-10">
                        <div className="flex gap-2 mb-4 shrink-0">
                            {['shop', 'shrine', 'inventory'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`flex-1 py-3 rounded-2xl font-black uppercase text-[10px] border transition-all flex items-center justify-center gap-1.5 ${view === v ? 'bg-white text-black border-white shadow-xl scale-105' : 'bg-white/5 border-white/10 opacity-60 text-white'}`}>
                                    {v === 'shop' && <Icon name="Anchor" size={12}/>}
                                    {v === 'shrine' && <Icon name="Compass" size={12}/>}
                                    {v === 'inventory' && <Icon name="Log" size={12}/>}
                                    {v}
                                </button>
                            ))}
                        </div>

                        {view === 'shop' && (
                            <div className="flex-1 flex flex-col overflow-hidden">
                                <div className="flex gap-3 overflow-x-auto no-scrollbar pb-4 shrink-0 snap-x">
                                    {STANDARD_PACKS.map(p => (
                                        <button key={p.id} disabled={isOpening || isSealed || (p.currency === 'dubloon' ? dubloons : pearls) < getPackCost(p)} onClick={() => openPack(p)} className="shrink-0 w-28 snap-start bg-white/5 border border-white/10 p-3 rounded-2xl flex flex-col items-center disabled:opacity-30">
                                            <Icon name={p.icon} size={20} className="mb-2 text-cyan-400" />
                                            <span className="text-[8px] font-black uppercase opacity-50 mb-1 text-white truncate w-full text-center">{p.name}</span>
                                            <span className="text-xs font-black text-white">{p.cost === 0 ? 'FREE' : formatNum(getPackCost(p))}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className={`flex-1 flex items-center justify-center rounded-[3rem] border-2 border-white/10 bg-white/5 backdrop-blur-sm relative overflow-hidden mb-4 ${lastPull ? MUTATIONS[lastPull.mutation || 'none'].glow : ''}`}>
                                    {isOpening ? (
                                        <div className="animate-pulse flex flex-col items-center">
                                            <Icon name="Anchor" size={40} className="text-cyan-400 mb-4 animate-bounce" />
                                            <span className="text-[10px] font-black uppercase tracking-widest text-cyan-400">Dredging...</span>
                                        </div>
                                    ) : isSealed ? (
                                        <div className="w-full h-full flex flex-col items-center justify-center cursor-pointer" onClick={ripTape}>
                                            <div className={`w-40 h-56 rounded-2xl border-4 border-white/20 shadow-2xl flex flex-col items-center justify-center relative transition-all duration-300 ${isRipping ? 'scale-110 opacity-0' : 'animate-bounce'} ${actStyles.bg}`}>
                                                <div className={`absolute top-0 left-0 right-0 h-10 bg-slate-950 flex items-center justify-center transition-all duration-300 origin-bottom-left ${isRipping ? 'translate-x-full rotate-12' : ''} ${actStyles.seal}`}>
                                                    <span className="text-[8px] font-black uppercase tracking-widest opacity-80 text-white">Tear Seal</span>
                                                </div>
                                                <Icon name={activePack.icon} size={48} className="text-white/40" />
                                            </div>
                                            <div className="absolute bottom-10 flex items-center gap-2 bg-cyan-500 text-white px-6 py-3 rounded-full font-black text-xs uppercase animate-pulse shadow-lg">
                                                <Icon name="MousePointer2" size={14} /> Tap to Open
                                            </div>
                                        </div>
                                    ) : lastPull ? (
                                        <div className={`w-full h-full p-8 flex flex-col items-center justify-center text-center ${lastPull.rarity.bg}`}>
                                            <div className="flex gap-2 mb-4 relative z-10">
                                                <span className={`text-[8px] font-black uppercase px-3 py-1 rounded-full border border-current bg-white/90 ${lastPull.rarity.color}`}>{lastPull.rarity.label}</span>
                                                {lastPull.mutation !== 'none' && <span className={`text-[8px] font-black uppercase px-3 py-1 rounded-full border border-current bg-white/90 ${MUTATIONS[lastPull.mutation].color}`}>{MUTATIONS[lastPull.mutation].label}</span>}
                                            </div>
                                            <h2 className={`text-3xl font-black leading-tight mb-6 relative z-10 ${MUTATIONS[lastPull.mutation || 'none'].color}`}>{lastPull.name}</h2>
                                            
                                            <div className="grid grid-cols-2 gap-4 w-full mb-6 relative z-10">
                                                <div className="bg-slate-950/50 p-4 rounded-3xl border border-white/5">
                                                    <span className="text-[8px] font-black uppercase opacity-50 block mb-1 text-white">Income</span>
                                                    <div className="flex items-center justify-center gap-1 text-teal-400 font-black"><Icon name={lastPull.currency==='pearl'?'Droplet':'Coins'} size={12}/> {formatNum(lastPull.cps * MUTATIONS[lastPull.mutation].mult)}/s</div>
                                                </div>
                                                <div className="bg-slate-950/50 p-4 rounded-3xl border border-white/5">
                                                    <span className="text-[8px] font-black uppercase opacity-50 block mb-1 text-white">Value</span>
                                                    <div className="flex items-center justify-center gap-1 text-amber-400 font-black"><Icon name={lastPull.currency==='pearl'?'Droplet':'Coins'} size={12}/> {formatNum(lastPull.value * MUTATIONS[lastPull.mutation].mult)}</div>
                                                </div>
                                            </div>

                                            <div className="w-full space-y-2 relative z-10">
                                                <button onClick={() => sellItem(lastPull)} className="w-full bg-white text-slate-950 py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Trade to Merchant</button>
                                                <button onClick={() => setLastPull(null)} className="w-full bg-slate-950/50 text-white border border-white/10 py-3 rounded-2xl font-black text-[10px] uppercase active:scale-95 transition-all">Stow in Log</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="opacity-20 flex flex-col items-center text-white">
                                            <Icon name="Ship" size={60} />
                                            <span className="text-xs font-black uppercase mt-4">Awaiting Cargo</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'shrine' && (
                            <div className="flex-1 overflow-y-auto pb-20 no-scrollbar space-y-6">
                                <section>
                                    <h3 className="text-[10px] font-black text-white uppercase tracking-widest opacity-40 mb-3 flex items-center gap-2">
                                        <Icon name="Droplet" size={12} /> Mutations
                                    </h3>
                                    <div className="space-y-2">
                                        {MUTATION_PACKS.map(p => (
                                            <button key={p.id} disabled={pearls < p.cost || isOpening || isSealed} onClick={() => openPack(p)} className="w-full bg-white/5 border border-white/10 p-4 rounded-3xl flex items-center justify-between active:scale-95 disabled:opacity-30">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${MUTATIONS[p.mutation].bg}`}>
                                                        <Icon name={p.icon} size={24} className={MUTATIONS[p.mutation].color} />
                                                    </div>
                                                    <div className="text-left">
                                                        <h4 className="font-black text-sm text-white">{p.name}</h4>
                                                        <p className="text-[10px] opacity-50 text-white">{p.desc}</p>
                                                    </div>
                                                </div>
                                                <span className="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full text-xs font-black flex items-center gap-1"><Icon name="Droplet" size={10}/> {formatNum(p.cost)}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-white opacity-40 mb-3 flex items-center gap-2">
                                        <Icon name="Compass" size={12} /> Fleet Upgrades
                                    </h3>
                                    <div className="space-y-2">
                                        {[
                                            { id: 'luck', name: "Siren's Blessing", icon: 'Wand2', desc: "Improves Rare+ odds.", cost: (upgrades.luck + 1) * 500, lvl: upgrades.luck },
                                            { id: 'discount', name: "Pirate's Barter", icon: 'Percent', desc: "5% Crate discount.", cost: (upgrades.discount + 1) * 1000, lvl: upgrades.discount },
                                            { id: 'multiplier', name: "Tidal Force", icon: 'Calculator', desc: "Global x0.5 multiplier.", cost: upgrades.multiplier * 2500, lvl: (upgrades.multiplier * 2 - 1) }
                                        ].map(u => (
                                            <button key={u.id} disabled={pearls < u.cost} onClick={() => buyUpgrade(u.id)} className="w-full bg-white/5 border border-white/10 p-4 rounded-3xl flex items-center justify-between active:scale-95 disabled:opacity-30">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center">
                                                        <Icon name={u.icon} size={24} className="text-teal-400" />
                                                    </div>
                                                    <div className="text-left">
                                                        <h4 className="font-black text-sm text-white flex items-center gap-2">{u.name} <span className="bg-white/10 px-1.5 py-0.5 rounded text-[8px] uppercase">Lvl {u.lvl}</span></h4>
                                                        <p className="text-[10px] opacity-50 text-white">{u.desc}</p>
                                                    </div>
                                                </div>
                                                <span className="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full text-xs font-black flex items-center gap-1"><Icon name="Droplet" size={10}/> {formatNum(u.cost)}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="flex-1 overflow-y-auto px-4 pb-20 no-scrollbar">
                                <div className="bg-white/5 border border-white/10 p-5 rounded-[2rem] mb-6 flex flex-col gap-4 shadow-sm">
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <h3 className="text-xl font-black uppercase tracking-tighter">Captain's Log</h3>
                                            <p className="text-[10px] font-black uppercase opacity-40">{inventory.length} Cargo Items</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={sellAllDuplicates} className="bg-amber-500/20 text-amber-400 px-3 py-2 rounded-xl text-[9px] font-black uppercase border border-amber-500/20 active:scale-95 transition-all">Sell Dups</button>
                                            <button onClick={() => { if(window.confirm("Jettison all cargo?")) { setInventory([]); }}} className="bg-red-500/20 text-red-400 px-3 py-2 rounded-xl text-[9px] font-black uppercase border border-red-500/20 active:scale-95 transition-all">Jettison</button>
                                        </div>
                                    </div>
                                </div>

                                {inventory.length === 0 && <div className="text-center py-20 opacity-20 font-black uppercase text-xs">No artifacts found.</div>}
                                
                                {RARITIES.map(r => {
                                    const items = MASTER_ITEM_DB.filter(m => m.rid === r.id);
                                    let renderedAny = false;
                                    
                                    const rows = items.map(m => {
                                        const owned = inventory.filter(i => i.name === m.name);
                                        if (owned.length === 0) return null;
                                        
                                        renderedAny = true;
                                        owned.sort((a,b) => MUTATION_ORDER.indexOf(b.mutation || 'none') - MUTATION_ORDER.indexOf(a.mutation || 'none'));
                                        
                                        const bestItem = owned[0];
                                        const worstItem = owned[owned.length - 1];
                                        const count = owned.length;
                                        const mult = MUTATIONS[bestItem.mutation || 'none'].mult;
                                        const worstMult = MUTATIONS[worstItem.mutation || 'none'].mult;

                                        return (
                                            <div key={bestItem.id} className={`p-4 rounded-3xl border flex items-center justify-between ${MUTATIONS[bestItem.mutation || 'none'].bg} border-white/10 ${MUTATIONS[bestItem.mutation || 'none'].glow}`}>
                                                <div className="flex items-center gap-4 overflow-hidden pr-2">
                                                    <div className="shrink-0"><Icon name="BoxSelect" size={20} className={MUTATIONS[bestItem.mutation || 'none'].color} /></div>
                                                    <div className="text-left truncate">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <h5 className="font-black text-xs truncate text-slate-900">{bestItem.name}</h5>
                                                            {count > 1 && <span className="bg-slate-900 text-white px-1.5 py-0.5 rounded text-[8px] font-black">x{count}</span>}
                                                            {bestItem.mutation && bestItem.mutation !== 'none' && <span className={`text-[7px] font-black uppercase px-2 py-0.5 rounded border border-current ${MUTATIONS[bestItem.mutation].color} bg-white shrink-0`}>{MUTATIONS[bestItem.mutation].label}</span>}
                                                        </div>
                                                        <span className="text-[10px] font-black text-teal-600 flex items-center gap-1"><Icon name="Coins" size={10}/>+{formatNum(bestItem.cps * mult)}/s</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => sellItem(worstItem)} className="shrink-0 w-16 h-12 rounded-2xl bg-slate-950 flex flex-col items-center justify-center active:scale-90 transition-all border border-white/5">
                                                    <span className="text-[8px] font-black text-white/50 uppercase">{count > 1 ? 'Sell Dup' : 'Sell'}</span>
                                                    <div className="flex items-center gap-1">
                                                        <span className="text-[9px] font-black text-amber-400 truncate text-center">{formatNum(worstItem.value * worstMult)}</span>
                                                        <Icon name={worstItem.currency === 'pearl' ? 'Droplet' : 'Coins'} size={8} className={worstItem.currency === 'pearl' ? 'text-cyan-400' : 'text-amber-400'} />
                                                    </div>
                                                </button>
                                            </div>
                                        );
                                    });

                                    if (!renderedAny) return null;

                                    return (
                                        <div key={r.id} className="pt-2">
                                            <h4 className="text-[10px] font-black uppercase tracking-[0.3em] text-white opacity-40 mb-3 flex items-center gap-2">
                                                <div className={`w-1.5 h-4 rounded-full ${r.bg.split('/')[0]}`} /> {r.label}
                                            </h4>
                                            <div className="space-y-2">
                                                {rows}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/50 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 text-[9px] font-black text-white/50 uppercase pointer-events-none">
                        Auto-Saving...
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
