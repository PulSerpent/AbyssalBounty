<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Abyssal Bounty</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 0px); 
            --safe-bottom: env(safe-area-inset-bottom, 0px); 
        }
        body { 
            overscroll-behavior-y: none; 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none; 
            touch-action: manipulation; 
            background-color: #020617; 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .safe-pt { padding-top: max(var(--safe-top), 1rem); }
        .safe-pb { padding-bottom: max(var(--safe-bottom), 1.5rem); }
        
        @keyframes float-up { 
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; } 
            20% { opacity: 0.6; } 
            80% { opacity: 0.6; } 
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } 
        }
        .bubble { animation: float-up linear infinite; position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.1)); pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONSTANTS ---
        const RARITIES = [
            { id: 'trash', label: 'Trash', color: 'text-stone-500', bg: 'bg-stone-200/90', multiplier: 0.5, incomeBase: 0.02 },
            { id: 'common', label: 'Common', color: 'text-zinc-400', bg: 'bg-zinc-50/90', multiplier: 1, incomeBase: 0.1 },
            { id: 'uncommon', label: 'Uncommon', color: 'text-teal-400', bg: 'bg-teal-50/90', multiplier: 3, incomeBase: 0.5 },
            { id: 'rare', label: 'Rare', color: 'text-sky-400', bg: 'bg-sky-50/90', multiplier: 8, incomeBase: 2.5 },
            { id: 'epic', label: 'Epic', color: 'text-indigo-400', bg: 'bg-indigo-50/90', multiplier: 20, incomeBase: 12.0 },
            { id: 'legendary', label: 'Legendary', color: 'text-amber-400', bg: 'bg-amber-50/90', multiplier: 60, incomeBase: 60.0 },
            { id: 'mythic', label: 'Mythic', color: 'text-rose-400', bg: 'bg-rose-50/90', multiplier: 200, incomeBase: 250.0 },
            { id: 'celestial', label: 'Celestial', color: 'text-cyan-300', bg: 'bg-cyan-50/90', multiplier: 800, incomeBase: 1500.0 },
            { id: 'primordial', label: 'Primordial', color: 'text-fuchsia-500', bg: 'bg-fuchsia-50/90', multiplier: 3500, incomeBase: 10000.0 },
            { id: 'transcendent', label: 'Transcendent', color: 'text-yellow-300', bg: 'bg-slate-900/90', multiplier: 15000, incomeBase: 80000.0 },
        ];

        const MUTATIONS = {
            none: { label: '', mult: 1, color: 'text-slate-900', bg: 'bg-white/90', glow: '' },
            bioluminescent: { label: 'Bioluminescent', mult: 3, color: 'text-lime-500', bg: 'bg-lime-50/90', glow: 'shadow-[0_0_15px_rgba(132,204,22,0.4)]' },
            ethereal: { label: 'Ethereal', mult: 500, color: 'text-cyan-200', bg: 'bg-white/95', glow: 'shadow-[0_0_30px_rgba(165,243,252,0.8)]' }
        };

        const MASTER_ITEMS = [
            { name: "Soggy Seaweed", rid: "trash" }, { name: "Waterlogged Boot", rid: "trash" },
            { name: "Barnacle Shell", rid: "common" }, { name: "Driftwood", rid: "common" },
            { name: "Shark Tooth", rid: "uncommon" }, { name: "Pearl Oyster", rid: "uncommon" },
            { name: "Glowing Urchin", rid: "rare" }, { name: "Pirate Medallion", rid: "rare" },
            { name: "Kraken Tentacle", rid: "epic" }, { name: "Captain Logbook", rid: "epic" },
            { name: "Poseidon Trident", rid: "legendary" }, { name: "Siren Tear", rid: "legendary" },
            { name: "Leviathan Core", rid: "mythic" }, { name: "Breath of Sea", rid: "mythic" },
            { name: "Astral Pearl", rid: "celestial" }, { name: "Zodiac Compass", rid: "celestial" },
            { name: "Genesis Drop", rid: "primordial" }, { name: "Earth Core", rid: "primordial" },
            { name: "Reality Shard", rid: "transcendent" }, { name: "Infinite Ocean", rid: "transcendent" }
        ];

        const PACKS = [
            { id: 'flotsam', name: 'Flotsam', cost: 0, w: { trash: 70, common: 30 } },
            { id: 'sunken', name: 'Sunken', cost: 5000, w: { common: 30, uncommon: 50, rare: 18, epic: 2 } },
            { id: 'trench', name: 'Trench', cost: 1500000, w: { rare: 50, epic: 40, legendary: 9, mythic: 1 } },
            { id: 'atlantis', name: 'Atlantis', cost: 5000000000000, w: { celestial: 50, primordial: 45, transcendent: 5 } },
        ];

        // --- SVG ICONS (Replaces Lucide to prevent crashes) ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                Coins: <path d="M11 15h2M8 15h.01M16 15h.01M3 11a9 9 0 0 1 18 0v7a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-7Z"/>,
                Droplet: <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7Z"/>,
                Anchor: <path d="M12 22V8m0 0 4 4m-4-4-4 4M5 12a7 7 0 0 0 14 0"/>,
                Log: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V6A2.5 2.5 0 0 1 6.5 3.5H20v14"/>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"/>}
                </svg>
            );
        };

        const format = (n) => {
            if (n < 1000) return Math.floor(n);
            if (n < 1000000) return (n/1000).toFixed(1) + 'k';
            if (n < 1000000000) return (n/1000000).toFixed(1) + 'M';
            if (n < 1000000000000) return (n/1000000000).toFixed(1) + 'B';
            return (n/1000000000000).toFixed(1) + 'T';
        };

        const App = () => {
            const [dubloons, setDubloons] = useState(100);
            const [pearls, setPearls] = useState(0);
            const [inventory, setInventory] = useState([]);
            const [view, setView] = useState('shop');
            const [isOpening, setIsOpening] = useState(false);
            const [pendingLoot, setPendingLoot] = useState(null);
            const [isRipping, setIsRipping] = useState(false);
            const [upgrades, setUpgrades] = useState({ luck: 0, multiplier: 1 });

            useEffect(() => {
                const saved = localStorage.getItem('abyssal_app_save');
                if (saved) {
                    const d = JSON.parse(saved);
                    setDubloons(d.dubloons || 100);
                    setPearls(d.pearls || 0);
                    setInventory(d.inventory || []);
                    setUpgrades(d.upgrades || { luck: 0, multiplier: 1 });
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('abyssal_app_save', JSON.stringify({ dubloons, pearls, inventory, upgrades }));
            }, [dubloons, pearls, inventory, upgrades]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const income = inventory.reduce((acc, i) => acc + (i.cps * MUTATIONS[i.mut].mult), 0);
                    setDubloons(d => d + (income * upgrades.multiplier) / 10);
                }, 100);
                return () => clearInterval(interval);
            }, [inventory, upgrades]);

            const pull = (pack) => {
                if (dubloons < pack.cost) return;
                setDubloons(d => d - pack.cost);
                setIsOpening(true);

                setTimeout(() => {
                    const rids = Object.keys(pack.w);
                    const rid = rids[Math.floor(Math.random() * rids.length)];
                    const rarity = RARITIES.find(r => r.id === rid);
                    const items = MASTER_ITEMS.filter(i => i.rid === rid);
                    const item = items[Math.floor(Math.random() * items.length)];
                    
                    setPendingLoot({ 
                        id: Date.now(), 
                        name: item.name, 
                        rarity, 
                        mut: 'none', 
                        cps: rarity.incomeBase, 
                        val: Math.floor(rarity.incomeBase * 200) 
                    });
                    setIsOpening(false);
                }, 600);
            };

            const finalize = () => {
                setIsRipping(true);
                setTimeout(() => {
                    setInventory(prev => [pendingLoot, ...prev]);
                    setPendingLoot(null);
                    setIsRipping(false);
                }, 300);
            };

            const buyMultiplier = () => {
                const cost = upgrades.multiplier * 1000;
                if (dubloons < cost) return;
                setDubloons(d => d - cost);
                setUpgrades(u => ({ ...u, multiplier: u.multiplier + 0.5 }));
            };

            return (
                <div className="h-screen flex flex-col bg-slate-950 text-white overflow-hidden">
                    <nav className="p-4 bg-slate-900 border-b border-slate-800 safe-pt flex justify-between items-center">
                        <div>
                            <div className="text-amber-400 font-black text-xl flex items-center gap-2"><Icon name="Coins" size={18}/> {format(dubloons)}</div>
                            <div className="text-cyan-400 font-bold text-sm flex items-center gap-2"><Icon name="Droplet" size={14}/> {format(pearls)}</div>
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] font-black uppercase opacity-40">Abyssal Bounty</div>
                            <div className="text-[10px] font-black text-teal-400">x{upgrades.multiplier.toFixed(1)} POWER</div>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto p-4 no-scrollbar">
                        <div className="flex gap-2 mb-6">
                            {['shop', 'shrine', 'inventory'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`flex-1 py-3 rounded-2xl font-black uppercase text-[10px] border transition-all ${view === v ? 'bg-white text-black border-white shadow-lg scale-105' : 'bg-white/5 border-white/10 opacity-60'}`}>
                                    {v}
                                </button>
                            ))}
                        </div>

                        {view === 'shop' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    {PACKS.map(p => (
                                        <button key={p.id} onClick={() => pull(p)} className="bg-white/5 p-5 rounded-3xl border border-white/10 active:scale-95 text-left">
                                            <div className="text-[10px] font-black opacity-40 uppercase mb-1">{p.name}</div>
                                            <div className="text-sm font-bold text-amber-500">{p.cost === 0 ? "FREE" : format(p.cost)}</div>
                                        </button>
                                    ))}
                                </div>

                                <div className="aspect-square rounded-[3rem] border-2 border-white/10 bg-white/5 flex items-center justify-center relative overflow-hidden shadow-inner">
                                    {isOpening ? <Icon name="Anchor" size={48} className="animate-bounce text-cyan-500"/> : 
                                     pendingLoot ? (
                                        <div className="w-full h-full flex flex-col items-center justify-center p-8 text-center" onClick={finalize}>
                                            <div className={`w-40 h-56 rounded-2xl bg-gradient-to-b from-slate-700 to-slate-900 border-4 border-white/20 shadow-2xl flex flex-col items-center justify-center relative transition-all duration-300 ${isRipping ? 'scale-110 opacity-0' : 'animate-bounce'}`}>
                                                <div className="absolute top-0 w-full h-10 bg-slate-950 flex items-center justify-center"><span className="text-[8px] font-black uppercase opacity-40">Tear Seal</span></div>
                                                <div className="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center opacity-20">📦</div>
                                            </div>
                                            <div className="mt-6 bg-cyan-500 text-white px-8 py-3 rounded-full font-black text-xs uppercase animate-pulse shadow-lg">Tap to Open</div>
                                        </div>
                                     ) : inventory[0] ? (
                                        <div className="text-center p-8 animate-in fade-in zoom-in">
                                            <div className={`text-[10px] font-black uppercase mb-3 px-3 py-1 rounded-full border inline-block ${inventory[0].rarity.color} bg-white/5`}>{inventory[0].rarity.label}</div>
                                            <div className="text-4xl font-black mb-6 tracking-tighter">{inventory[0].name}</div>
                                            <div className="text-teal-400 font-bold text-xl">+{format(inventory[0].cps)}/s</div>
                                        </div>
                                     ) : <div className="opacity-10 text-center"><div className="text-6xl mb-2">⚓</div><div className="font-black uppercase text-xs">Port Empty</div></div>}
                                </div>
                            </div>
                        )}

                        {view === 'shrine' && (
                            <div className="space-y-4">
                                <button onClick={buyMultiplier} className="w-full bg-white/5 border border-white/10 p-6 rounded-3xl flex justify-between items-center active:scale-95 transition-all">
                                    <div>
                                        <div className="font-black text-lg">Tidal Force Upgrade</div>
                                        <div className="text-xs opacity-40">Increase global income by x0.5</div>
                                    </div>
                                    <div className="text-amber-500 font-black">{format(upgrades.multiplier * 1000)} D</div>
                                </button>
                                <div className="p-8 text-center opacity-20 italic text-sm">More upgrades coming soon...</div>
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="space-y-3 pb-20">
                                {inventory.length === 0 && <div className="text-center opacity-20 py-20">Log is empty. Go to port!</div>}
                                {inventory.map(item => (
                                    <div key={item.id} className="bg-white/5 p-4 rounded-3xl border border-white/10 flex justify-between items-center shadow-sm">
                                        <div>
                                            <div className={`text-[10px] font-black uppercase ${item.rarity.color}`}>{item.rarity.label}</div>
                                            <div className="font-bold text-sm">{item.name}</div>
                                        </div>
                                        <div className="text-teal-400 font-black text-xs">+{format(item.cps * MUTATIONS[item.mut].mult)}/s</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-4 opacity-50 pointer-events-none">
                        {[...Array(5)].map((_, i) => <div key={i} className="w-2 h-2 rounded-full bg-white/20"/>)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

Sent from Outlook for iOS
