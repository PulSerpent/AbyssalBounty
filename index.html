            const holdTimer = useRef(null);
            const isHolding = useRef(false);
            const touchStartY = useRef(0);

            const sortItems = (a, b) => {
                const mutA = MUTATION_ORDER.indexOf(a.mutation || a.mut || 'none');
                const mutB = MUTATION_ORDER.indexOf(b.mutation || b.mut || 'none');
                if (mutA !== mutB) return mutB - mutA;
                if (a.currency === 'pearl' && b.currency === 'dubloon') return -1;
                if (b.currency === 'pearl' && a.currency === 'dubloon') return 1;
                return 0;
            };

            useEffect(() => {
                const saved = localStorage.getItem('abyssal_v9_aquarium');
                if (saved) {
                    try {
                        const d = JSON.parse(saved);
                        if(typeof d.dubloons === 'number') setDubloons(d.dubloons);
                        if(typeof d.pearls === 'number') setPearls(d.pearls);
                        if(Array.isArray(d.inventory)) setInventory(d.inventory);
                        if(d.upgrades) setUpgrades(prev => ({...prev, ...d.upgrades}));
                        if(Array.isArray(d.claimedSets)) setClaimedSets(d.claimedSets);
                    } catch(e) {}
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('abyssal_v9_aquarium', JSON.stringify({ dubloons, pearls, inventory, upgrades, claimedSets }));
            }, [dubloons, pearls, inventory, upgrades, claimedSets]);

            const incomeFlow = useMemo(() => {
                const bestItems = {};
                inventory.forEach(item => {
                    const itemName = item.name;
                    const currentBest = bestItems[itemName];
                    if (!currentBest || sortItems(item, currentBest) < 0) {
                        bestItems[itemName] = item;
                    }
                });
                return Object.values(bestItems).reduce((acc, item) => {
                    const itemMut = item.mutation || item.mut || 'none';
                    const mult = MUTATIONS[itemMut]?.mult || 1;
                    const val = (item.cps || 0) * mult;
                    if (item.currency === 'pearl') acc.pearls += val;
                    else acc.dubloons += val;
                    return acc;
                }, { dubloons: 0, pearls: 0 });
            }, [inventory]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setDubloons(d => d + (incomeFlow.dubloons * upgrades.multiplier / 10));
                    setPearls(p => p + (incomeFlow.pearls * upgrades.multiplier / 10));
                }, 100);
                return () => clearInterval(timer);
            }, [incomeFlow, upgrades.multiplier]);

            const getDynamicWeights = (pack, luckLvl) => {
                if(!pack.weights) return {};
                const weights = { ...pack.weights };
                if (luckLvl > 0) {
                    const boost = 1 + (luckLvl * 0.2);
                    ['rare', 'epic', 'legendary', 'mythic', 'celestial', 'primordial', 'transcendent'].forEach(r => {
                        if(weights[r]) weights[r] *= boost;
                    });
                }
                return weights;
            };

            const getPackCost = (p) => p.currency === 'dubloon' ? Math.floor(p.cost * (1 - (upgrades.discount * 0.05))) : p.cost;

            const handlePressStart = (e, pack) => {
                if (e.touches && e.touches.length > 0) touchStartY.current = e.touches[0].clientY;
                isHolding.current = false;
                holdTimer.current = setTimeout(() => {
                    isHolding.current = true;
                    setInspectedPack(pack);
                    if(navigator.vibrate) navigator.vibrate(50);
                }, 500);
            };

            const handlePressEnd = () => {
                if (holdTimer.current) {
                    clearTimeout(holdTimer.current);
                    holdTimer.current = null;
                }
            };

            const handlePressMove = (e) => {
                if (e.touches && e.touches.length > 0) {
                    if (Math.abs(e.touches[0].clientY - touchStartY.current) > 10) handlePressEnd();
                } else {
                    handlePressEnd();
                }
            };

            const handlePackClick = (e, pack) => {
                e.preventDefault();
                if (isHolding.current) {
                    isHolding.current = false;
                    return; 
                }
                openPack(pack);
            };

            const openPack = (pack) => {
                const cost = getPackCost(pack);
                const balance = pack.currency === 'dubloon' ? dubloons : pearls;
                if (balance < cost) return;

                setIsOpening(true); setIsSealed(false); setLastPull(null); setActivePack(pack);
                if (pack.currency === 'dubloon') setDubloons(d => d - cost);
                else setPearls(p => p - cost);

                setTimeout(() => {
                    let rarity, mutation = pack.mutation || 'none';
                    if (pack.mutation) {
                        const ownedNames = [...new Set(inventory.map(i => i.name))];
                        const pool = ownedNames.length ? ownedNames : MASTER_ITEM_DB.map(i => i.name);
                        const name = pool[Math.floor(Math.random() * pool.length)];
                        const dbMatch = MASTER_ITEM_DB.find(i => i.name === name) || MASTER_ITEM_DB[0];
                        rarity = RARITIES.find(r => r.id === (dbMatch.rarityId || dbMatch.rid)) || RARITIES[0];
                        setPendingLoot(createItem(name, rarity, mutation, pack));
                    } else {
                        const weights = getDynamicWeights(pack, upgrades.luck);
                        const total = Object.values(weights).reduce((a, b) => a + b, 0);
                        let rand = Math.random() * total;
                        rarity = RARITIES[0];
                        for (const r of [...RARITIES].reverse()) {
                            const w = weights[r.id] || 0;
                            if (w > 0 && rand < w) { rarity = r; break; }
                            rand -= w;
                        }
                        const items = MASTER_ITEM_DB.filter(i => (i.rarityId || i.rid) === rarity.id);
                        const item = items[Math.floor(Math.random() * items.length)] || MASTER_ITEM_DB[0];
                        setPendingLoot(createItem(item.name, rarity, 'none', pack));
                    }
                    setIsOpening(false); setIsSealed(true);
                }, 600);
            };

            const createItem = (name, rarity, mutation, pack) => {
                const isPearl = Math.random() < (rarity.pearlChance || 0);
                const currency = isPearl ? 'pearl' : 'dubloon';
                const tierIdx = STANDARD_PACKS.findIndex(p => p.id === pack.id);
                const cpsBase = rarity.incomeBase * (tierIdx === -1 ? 5 : (tierIdx * 0.3 + 1));
                return { id: Date.now() + Math.random(), name, rarity, mutation, currency, cps: cpsBase, value: Math.floor(cpsBase * 50) };
            };

            const ripTape = () => {
                if (isRipping || isShaking) return;
                setIsShaking(true);
                
                const rarityId = pendingLoot.rarity.id;
                const shakeDelays = {
                    trash: 200, common: 400, uncommon: 800, rare: 1400, 
                    epic: 2000, legendary: 2800, mythic: 3800, 
                    celestial: 5000, primordial: 6500, transcendent: 8500
                };
                const shakeTime = shakeDelays[rarityId] || 1000;

                setTimeout(() => {
                    setIsShaking(false);
                    setIsRipping(true);
                    setTimeout(() => {
                        setInventory(prev => [pendingLoot, ...prev]);
                        setLastPull(pendingLoot); setPendingLoot(null); setIsSealed(false); setIsRipping(false);
                    }, 350);
                }, shakeTime);
            };

            const sellItem = (item) => {
                const itemMut = item.mutation || item.mut || 'none';
                const total = item.value * (MUTATIONS[itemMut]?.mult || 1);
                if (item.currency === 'pearl') setPearls(p => p + total);
                else setDubloons(d => d + total);
                setInventory(inv => inv.filter(i => i.id !== item.id));
                if (lastPull?.id === item.id) setLastPull(null);
            };

            const sellAllDuplicates = () => {
                let dIn = 0, pIn = 0;
                const newInv = [];
                const groups = {};
                inventory.forEach(i => { if(!groups[i.name]) groups[i.name] = []; groups[i.name].push(i); });
                Object.values(groups).forEach(g => {
                    g.sort(sortItems);
                    newInv.push(g[0]);
                    for(let i=1; i<g.length; i++){
                        const dup = g[i];
                        const itemMut = dup.mutation || dup.mut || 'none';
                        const v = dup.value * (MUTATIONS[itemMut]?.mult || 1);
                        if(dup.currency === 'pearl') pIn += v; else dIn += v;
                    }
                });
                setDubloons(d => d + dIn); setPearls(p => p + pIn); setInventory(newInv);
            };

            const buyUpgrade = (type) => {
                const cost = type === 'luck' ? (upgrades.luck + 1) * 500 : 
                             type === 'discount' ? (upgrades.discount + 1) * 1000 : 
                             upgrades.multiplier * 2500;
                if (pearls < cost) return;
                setPearls(p => p - cost);
                setUpgrades(u => ({ ...u, [type]: type === 'multiplier' ? u.multiplier + 0.5 : u[type] + 1 }));
            };

            const getPackStyles = (id) => {
                if(id === 'driftwood') return { bg: 'bg-amber-900', seal: 'bg-amber-950' };
                if(id === 'atlantis') return { bg: 'bg-blue-900', seal: 'bg-blue-950' };
                return { bg: 'bg-slate-700', seal: 'bg-slate-900' };
            };

            const getSetProgress = (rarityId, targetMut) => {
                const itemsInSet = MASTER_ITEM_DB.filter(m => (m.rarityId || m.rid) === rarityId);
                const targetMutIndex = MUTATION_ORDER.indexOf(targetMut);
                let count = 0;
                itemsInSet.forEach(dbItem => {
                    const owned = inventory.filter(i => i.name === dbItem.name);
                    if (owned.length > 0) {
                        const bestOwnedMutIndex = Math.max(...owned.map(i => MUTATION_ORDER.indexOf(i.mutation || i.mut || 'none')));
                        if (bestOwnedMutIndex >= targetMutIndex) count++;
                    }
                });
                return { count, total: itemsInSet.length };
            };

            const claimSetPrize = (rarity, mutKey) => {
                const claimId = `${rarity.id}-${mutKey}`;
                if (claimedSets.includes(claimId)) return;
                const progress = getSetProgress(rarity.id, mutKey);
                if (progress.count < progress.total) return;

                const mutMult = MUTATIONS[mutKey].mult || 1;
                const amount = rarity.setPrize.amt * mutMult;

                if (rarity.setPrize.curr === 'pearl') setPearls(p => p + amount);
                else setDubloons(d => d + amount);

                setClaimedSets(prev => [...prev, claimId]);
            };

            return (
                <div className="h-screen flex flex-col bg-slate-950 relative overflow-hidden">
                    {/* Fixed Background Included Directly in App to prevent React Scope issues */}
                    <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden bg-gradient-to-b from-cyan-900 via-blue-950 to-slate-950">
                        {[...Array(15)].map((_, i) => (
                            <div key={i} className="bubble" style={{ left: `${Math.random() * 100}vw`, width: `${Math.random() * 15 + 5}px`, height: `${Math.random() * 15 + 5}px`, animationDuration: `${Math.random() * 5 + 5}s`, animationDelay: `${Math.random() * 5}s` }} />
                        ))}
                    </div>

                    <nav className="p-4 bg-white/10 backdrop-blur-xl border-b border-white/10 safe-pt flex justify-between items-center z-20">
                        <div className="space-y-1">
                            <div className="flex items-center justify-between bg-slate-900/80 px-3 py-1 rounded-full border border-white/5 w-44">
                                <div className="flex items-center gap-2">
                                    <Icon name="Coins" size={14} className="text-amber-400 shrink-0" />
                                    <span className="text-xs font-black truncate">{formatNum(dubloons)}</span>
                                </div>
                                <span className="text-[9px] font-black text-amber-400/60">+{formatNum(incomeFlow.dubloons * upgrades.multiplier)}/s</span>
                            </div>
                            <div className="flex items-center justify-between bg-slate-900/80 px-3 py-1 rounded-full border border-white/5 w-44">
                                <div className="flex items-center gap-2">
                                    <Icon name="Droplet" size={14} className="text-cyan-400 shrink-0" />
                                    <span className="text-xs font-black truncate">{formatNum(pearls)}</span>
                                </div>
                                <span className="text-[9px] font-black text-cyan-400/60">+{formatNum(incomeFlow.pearls * upgrades.multiplier)}/s</span>
                            </div>
                        </div>
                        <div className="text-right"><div className="text-[10px] font-black uppercase opacity-40">Abyssal Bounty</div><div className="text-[9px] font-black text-teal-400">x{upgrades.multiplier.toFixed(1)} POWER</div></div>
                    </nav>

                    <main className="flex-1 overflow-y-auto max-w-md mx-auto w-full p-4 flex flex-col no-scrollbar z-10">
                        <div className="flex gap-2 mb-4 shrink-0">
                            {[{id:'shop',i:'Anchor'},{id:'shrine',i:'Zap'},{id:'inventory',i:'Log'}].map(t => (
                                <button key={t.id} onClick={()=>setView(t.id)} className={`flex-1 py-3 rounded-2xl font-black uppercase text-[10px] border transition-all flex items-center justify-center gap-2 ${view === t.id ? 'bg-white text-black' : 'bg-white/5 opacity-60'}`}>
                                    <Icon name={t.i} size={12}/>{t.id}
                                </button>
                            ))}
                        </div>

                        {view === 'shop' && (
                            <div className="flex-1 flex flex-col">
                                <div className="text-[9px] font-black text-center text-white/40 uppercase mb-2">Hold down on a crate to view drop rates</div>
                                <div className="flex gap-3 overflow-x-auto no-scrollbar pb-4 shrink-0 snap-x">
                                    {STANDARD_PACKS.map(p => (
                                        <button 
                                            key={p.id} 
                                            disabled={isOpening||isSealed||(p.currency==='dubloon'?dubloons:pearls)<getPackCost(p)} 
                                            onTouchStart={(e) => handlePressStart(e, p)}
                                            onTouchEnd={handlePressEnd}
                                            onTouchMove={handlePressMove}
                                            onMouseDown={(e) => handlePressStart(e, p)}
                                            onMouseUp={handlePressEnd}
                                            onMouseLeave={handlePressEnd}
                                            onClick={(e) => handlePackClick(e, p)}
                                            className="shrink-0 w-28 snap-start bg-white/5 border border-white/10 p-3 rounded-2xl flex flex-col items-center disabled:opacity-30 select-none cursor-pointer"
                                            style={{ WebkitTouchCallout: 'none', userSelect: 'none' }}
                                        >
                                            <Icon name={p.icon || 'Box'} size={20} className="mb-2 text-cyan-400 pointer-events-none" />
                                            <span className="text-[8px] font-black uppercase opacity-50 truncate w-full text-center pointer-events-none">{p.name}</span>
                                            <span className="text-xs font-black pointer-events-none">{p.cost === 0 ? 'FREE' : formatNum(getPackCost(p))}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className={`flex-1 flex items-center justify-center rounded-[3rem] border-2 border-white/10 bg-white/5 backdrop-blur-sm relative overflow-hidden mb-4 ${lastPull ? (MUTATIONS[lastPull.mutation || lastPull.mut || 'none']?.glow || '') : ''}`}>
                                    {isOpening ? <div className="animate-pulse flex flex-col items-center"><Icon name="Anchor" size={40} className="text-cyan-400 animate-bounce" /></div> :
                                     isSealed ? <div className="w-full h-full flex flex-col items-center justify-center cursor-pointer" onClick={ripTape}>
                                            <div className={`w-40 h-56 rounded-2xl border-4 border-white/20 shadow-2xl relative transition-all duration-300 ${isRipping?'scale-110 opacity-0': isShaking ? 'animate-shake-slow' : 'animate-float'} ${activePack ? getPackStyles(activePack.id).bg : 'bg-slate-700'}`}>
                                                <div className={`absolute top-0 left-0 right-0 h-10 bg-slate-950 flex items-center justify-center transition-all duration-300 origin-bottom-left ${isRipping ? 'translate-x-full rotate-12' : ''} bg-slate-950`}>
                                                    <span className="text-[8px] font-black uppercase opacity-80">Tear Seal</span>
                                                </div>
                                            </div>
                                            {!isShaking && !isRipping && <div className="absolute bottom-10 bg-cyan-500 px-6 py-3 rounded-full font-black text-xs uppercase animate-pulse shadow-lg text-white">Tap to Open</div>}
                                            {isShaking && <div className="absolute bottom-10 px-6 py-3 font-black text-xs uppercase animate-pulse text-cyan-400">Revealing...</div>}
                                        </div> :
                                     lastPull ? <div className={`w-full h-full p-8 flex flex-col items-center justify-center text-center ${lastPull.rarity.bg}`}>
                                            <div className="flex gap-2 mb-4 relative z-10 flex-wrap justify-center">
                                                {inventory.filter(i => i.name === lastPull.name).length > 1 && <span className="text-[8px] font-black uppercase px-3 py-1 rounded-full border bg-red-500 text-white shadow-[0_0_10px_rgba(239,68,68,0.5)] border-red-400 animate-pulse">Duplicate</span>}
                                                <span className={`text-[8px] font-black uppercase px-3 py-1 rounded-full border bg-white/90 ${lastPull.rarity.color}`}>{lastPull.rarity.label}</span>
                                                {(lastPull.mutation || lastPull.mut || 'none') !== 'none' && <span className={`text-[8px] font-black uppercase px-3 py-1 rounded-full border bg-white/90 ${MUTATIONS[lastPull.mutation || lastPull.mut].color}`}>{MUTATIONS[lastPull.mutation || lastPull.mut].label}</span>}
                                            </div>
                                            <h2 className={`text-4xl font-black mb-2 tracking-tighter ${MUTATIONS[lastPull.mutation || lastPull.mut || 'none'].color}`}>{lastPull.name}</h2>
                                            <div className="mb-6 flex items-center justify-center gap-1.5 bg-slate-900/50 px-3 py-1.5 rounded-full border border-white/10">
                                                <Icon name={lastPull.currency === 'pearl' ? 'Droplet' : 'Coins'} size={12} className={lastPull.currency === 'pearl' ? 'text-cyan-400' : 'text-amber-400'}/>
                                                <span className={`text-[10px] font-black ${lastPull.currency === 'pearl' ? 'text-cyan-400' : 'text-amber-400'}`}>+{formatNum((lastPull.cps * (MUTATIONS[lastPull.mutation || lastPull.mut || 'none']?.mult || 1)) * upgrades.multiplier)}/s</span>
                                            </div>
                                            <button onClick={()=>sellItem(lastPull)} className="w-full bg-white text-slate-950 py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Sell for {formatNum(lastPull.value * (MUTATIONS[lastPull.mutation || lastPull.mut || 'none']?.mult || 1))}</button>
                                            <button onClick={()=>setLastPull(null)} className="w-full mt-2 py-3 rounded-2xl font-black text-[10px] uppercase opacity-50">Stow in Log</button>
                                        </div> : <div className="opacity-10 text-center text-6xl">⚓</div>}
                                </div>
                            </div>
                        )}

                        {view === 'shrine' && (
                            <div className="space-y-6 overflow-y-auto no-scrollbar pb-20">
                                <section>
                                    <h3 className="text-[10px] font-black uppercase opacity-40 mb-3 flex items-center gap-2"><Icon name="Droplet" size={12}/> Mutations</h3>
                                    <div className="space-y-2">
                                        {MUTATION_PACKS.map(p => (
                                            <button key={p.id} disabled={pearls<p.cost} onClick={()=>openPack(p)} className="w-full bg-white/5 border border-white/10 p-4 rounded-3xl flex items-center justify-between active:scale-95 disabled:opacity-30">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${MUTATIONS[p.mutation].bg}`}><Icon name={p.icon || 'Sparkles'} size={24} className={MUTATIONS[p.mutation].color} /></div>
                                                    <div className="text-left"><h4 className="font-black text-sm">{p.name}</h4><p className="text-[10px] opacity-50">{p.desc}</p></div>
                                                </div>
                                                <span className="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full text-xs font-black">{formatNum(p.cost)} P</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                                <section>
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-white opacity-40 mb-3 flex items-center gap-2">
                                        <Icon name="Compass" size={12} /> Fleet Upgrades
                                    </h3>
                                    <div className="space-y-2">
                                        {[
                                            { id: 'luck', name: "Siren's Blessing", icon: 'Wand2', desc: "+20% chance for Rare+ items.", cost: (upgrades.luck + 1) * 500, lvl: upgrades.luck },
                                            { id: 'discount', name: "Pirate's Barter", icon: 'Percent', desc: "5% Crate discount.", cost: (upgrades.discount + 1) * 1000, lvl: upgrades.discount },
                                            { id: 'multiplier', name: "Tidal Force", icon: 'Calculator', desc: "Global x0.5 multiplier.", cost: upgrades.multiplier * 2500, lvl: (upgrades.multiplier * 2 - 1) }
                                        ].map(u => (
                                            <button key={u.id} disabled={pearls < u.cost} onClick={() => buyUpgrade(u.id)} className="w-full bg-white/5 border border-white/10 p-4 rounded-3xl flex items-center justify-between active:scale-95 disabled:opacity-30">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center">
                                                        <Icon name={u.icon} size={24} className="text-teal-400" />
                                                    </div>
                                                    <div className="text-left">
                                                        <h4 className="font-black text-sm text-white flex items-center gap-2">{u.name} <span className="bg-white/10 px-1.5 py-0.5 rounded text-[8px] uppercase">Lvl {u.lvl}</span></h4>
                                                        <p className="text-[10px] opacity-50 text-white">{u.desc}</p>
                                                    </div>
                                                </div>
                                                <span className="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full text-xs font-black flex items-center gap-1"><Icon name="Droplet" size={10}/> {formatNum(u.cost)}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="flex-1 overflow-y-auto pb-20 no-scrollbar">
                                <div className="bg-white/5 border border-white/10 p-5 rounded-[2rem] mb-6 flex justify-between items-center shrink-0 shadow-lg">
                                    <div><h3 className="text-xl font-black uppercase tracking-tighter">Captain's Log</h3><p className="text-[10px] font-black uppercase opacity-40">{inventory.length} Cargo Items</p></div>
                                    <button onClick={sellAllDuplicates} className="bg-amber-500/20 text-amber-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-amber-500/20 active:scale-95">Sell Dups</button>
                                </div>
                                {RARITIES.map(r => {
                                    const items = MASTER_ITEM_DB.filter(m => (m.rarityId || m.rid) === r.id);
                                    if (items.length === 0) return null;
                                    
                                    const isExpanded = expandedRewardRarity === r.id;
                                    const hasUnclaimed = MUTATION_ORDER.some(mutKey => {
                                        const prog = getSetProgress(r.id, mutKey);
                                        return prog.count >= prog.total && !claimedSets.includes(`${r.id}-${mutKey}`);
                                    });

                                    return (
                                        <div key={r.id} className="mb-8">
                                            <div className="flex justify-between items-center mb-3">
                                                <h4 className="text-[10px] font-black uppercase tracking-[0.3em] text-white opacity-40 flex items-center gap-2">
                                                    <div className={`w-1.5 h-4 rounded-full ${r.bg.split(' ')[0]}`} /> {r.label}
                                                </h4>
                                                <button onClick={() => setExpandedRewardRarity(isExpanded ? null : r.id)} className="relative bg-white/10 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider text-white/70 active:scale-95 border border-white/5 flex items-center gap-1.5">
                                                    <Icon name="Star" size={10} className={hasUnclaimed ? "text-amber-400" : "opacity-50"}/>
                                                    {isExpanded ? 'Hide Rewards' : 'Set Rewards'}
                                                    {hasUnclaimed && <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full animate-ping"></span>}
                                                    {hasUnclaimed && <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full"></span>}
                                                </button>
                                            </div>
                                            
                                            {isExpanded && (
                                                <div className="bg-slate-900/50 border border-white/5 rounded-2xl p-3 mb-4 space-y-2">
                                                    {MUTATION_ORDER.map(mutKey => {
                                                        const prog = getSetProgress(r.id, mutKey);
                                                        const isClaimed = claimedSets.includes(`${r.id}-${mutKey}`);
                                                        const canClaim = prog.count >= prog.total && !isClaimed;
                                                        const mutLabel = MUTATIONS[mutKey].label || 'Base';
                                                        const prizeAmt = r.setPrize.amt * MUTATIONS[mutKey].mult;
                                                        
                                                        return (
                                                            <div key={mutKey} className="flex justify-between items-center bg-white/5 p-2 rounded-xl">
                                                                <div className="flex flex-col">
                                                                    <span className={`text-[10px] font-black uppercase ${MUTATIONS[mutKey].color}`}>{mutLabel} Set</span>
                                                                    <span className="text-[9px] opacity-50 font-bold">{prog.count}/{prog.total} Unlocked</span>
                                                                </div>
                                                                {isClaimed ? (
                                                                    <span className="text-[10px] font-black text-white/20 uppercase px-3 flex items-center gap-1"><Icon name="Check" size={10}/> Claimed</span>
                                                                ) : (
                                                                    <button 
                                                                        onClick={() => claimSetPrize(r, mutKey)}
                                                                        disabled={!canClaim}
                                                                        className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all flex items-center gap-1 ${canClaim ? 'bg-amber-500 text-slate-950 shadow-[0_0_10px_rgba(245,158,11,0.5)] active:scale-95' : 'bg-white/5 text-white/30'}`}
                                                                    >
                                                                        {canClaim ? 'Claim' : 'Prize:'} <Icon name={r.setPrize.curr === 'pearl' ? 'Droplet' : 'Coins'} size={10} />
                                                                        {formatNum(prizeAmt)}
                                                                    </button>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}

                                            <div className="space-y-2">
                                                {items.map(m => {
                                                    const owned = inventory.filter(i => i.name === m.name);
                                                    if (!owned.length) return <div key={m.name} className="p-4 rounded-3xl border-2 border-dashed border-white/5 opacity-20 flex items-center gap-4"><Icon name="Lock" size={16} /><span className="text-[10px] font-black uppercase">{m.name}</span></div>;
                                                    
                                                    owned.sort(sortItems);
                                                    const best = owned[0]; 
                                                    const worst = owned[owned.length-1];
                                                    const bestMut = best.mutation || best.mut || 'none';
                                                    const worstMut = worst.mutation || worst.mut || 'none';
                                                    
                                                    return (
                                                        <div key={best.id} className={`p-4 rounded-3xl border flex items-center justify-between ${MUTATIONS[bestMut]?.bg || 'bg-white/90'} border-white/10 ${MUTATIONS[bestMut]?.glow || ''}`}>
                                                            <div className="flex items-center gap-4 truncate">
                                                                <Icon name="Box" size={20} className={MUTATIONS[bestMut]?.color || 'text-slate-900'} />
                                                                <div className="text-left truncate">
                                                                    <div className="flex items-center gap-2">
                                                                        <h5 className="font-black text-xs truncate text-slate-900">{best.name}</h5>
                                                                        {owned.length > 1 && <span className="bg-slate-900 text-white px-1.5 py-0.5 rounded text-[8px] font-black">x{owned.length}</span>}
                                                                        {best.currency === 'pearl' && <Icon name="Droplet" size={10} className="text-cyan-600" />}
                                                                    </div>
                                                                    <span className="text-[10px] font-black text-teal-600">+{formatNum(best.cps * (MUTATIONS[bestMut]?.mult || 1))}/s</span>
                                                                </div>
                                                            </div>
                                                            <button onClick={()=>sellItem(worst)} className="shrink-0 w-14 h-12 rounded-2xl bg-slate-950 flex flex-col items-center justify-center active:scale-90 border border-white/5">
                                                                <span className="text-[8px] font-black text-white/50 uppercase">{owned.length>1?'Dup':'Sell'}</span>
                                                                <span className="text-[9px] font-black text-amber-400">{formatNum(worst.value * (MUTATIONS[worstMut]?.mult || 1))}</span>
                                                            </button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* DROP RATES MODAL */}
                    {inspectedPack && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm" onClick={() => setInspectedPack(null)}>
                            <div className="bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-sm shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setInspectedPack(null)} className="absolute top-4 right-4 text-slate-500 p-2">
                                    <Icon name="X" size={20} />
                                </button>
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center border border-slate-700">
                                        <Icon name={inspectedPack.icon || 'Box'} size={24} className="text-cyan-400" />
                                    </div>
                                    <div>
                                        <h3 className="text-lg font-black text-white">{inspectedPack.name}</h3>
                                        <p className="text-[10px] text-slate-400 uppercase tracking-widest">Drop Rates</p>
                                    </div>
                                </div>
                                
                                <div className="space-y-2 max-h-[50vh] overflow-y-auto no-scrollbar pb-2">
                                    {RARITIES.map(r => {
                                        const dynamicWeights = getDynamicWeights(inspectedPack, upgrades.luck);
                                        const total = Object.values(dynamicWeights).reduce((a, b) => a + b, 0);
                                        const w = dynamicWeights[r.id] || 0;
                                        const pct = (w / total) * 100;
                                        if (pct === 0) return null;
                                        
                                        let displayPct;
                                        if (pct >= 10) displayPct = pct.toFixed(1) + '%';
                                        else if (pct >= 1) displayPct = pct.toFixed(2) + '%';
                                        else if (pct >= 0.001) displayPct = pct.toFixed(4) + '%';
                                        else if (pct >= 0.00001) displayPct = pct.toFixed(6) + '%';
                                        else displayPct = pct.toFixed(9) + '%';

                                        return (
                                            <div key={r.id} className="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border border-white/5">
                                                <span className={`text-[11px] font-black uppercase tracking-wider ${r.color}`}>{r.label}</span>
                                                <span className="text-[11px] font-mono font-bold text-white/80">{displayPct}</span>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
        
        // Remove loading screen once React is mounted
        document.getElementById('loading-screen').style.display = 'none';
    </script>
</body>
</html>
