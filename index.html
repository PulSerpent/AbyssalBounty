                                </div>
                            </div>
                        )}

                        {view === 'aquarium' && (
                            <div className="flex-1 min-h-[500px] flex flex-col relative bg-slate-900/50 rounded-[3rem] border border-white/5 overflow-hidden animate-in fade-in">
                                <div className="absolute top-0 left-0 right-0 p-8 flex justify-between items-start z-20 pointer-events-none">
                                    <div><h3 className="text-2xl font-black uppercase tracking-tighter">The Trench</h3><p className="text-[10px] font-black uppercase opacity-50 text-cyan-400">{incomeFlow.bestItemsList.length} Active Vessels swimming</p></div>
                                </div>
                                <div className="flex-1 relative w-full h-full">{incomeFlow.bestItemsList.map(item => <AquariumEntity key={item.id} item={item} />)}</div>
                            </div>
                        )}

                        {view === 'altar' && (
                            <div className="flex-1 flex flex-col gap-6 animate-in slide-in-from-right-4">
                                <div className="flex bg-white/5 p-1.5 rounded-2xl border border-white/5 shrink-0">
                                    <button onClick={() => setAltarMode('ascend')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${altarMode === 'ascend' ? 'bg-fuchsia-600 text-white shadow-lg' : 'text-white/40'}`}>Ascension</button>
                                    <button onClick={() => setAltarMode('transfer')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${altarMode === 'transfer' ? 'bg-fuchsia-600 text-white shadow-lg' : 'text-white/40'}`}>Transfer</button>
                                </div>
                                {altarMode === 'ascend' ? (
                                    <div className="space-y-4">
                                        <p className="text-[10px] text-center text-fuchsia-300 opacity-60 uppercase font-black px-4 leading-relaxed">Sacrifice 5 duplicates of the same rarity to forge an item of the next tier.</p>
                                        {RARITIES.slice(0, -1).map((r, idx) => {
                                            const dupes = getDuplicatesForRarity(r.id);
                                            const next = RARITIES[idx + 1];
                                            const canForge = dupes.length >= 5;
                                            return (
                                                <div key={r.id} className="bg-white/5 border border-white/5 p-5 rounded-3xl flex items-center justify-between transition-all hover:bg-white/10 group">
                                                    <div><div className={`text-xs font-black uppercase ${r.color}`}>{r.label}</div><div className="text-[9px] font-black text-white/30 uppercase">{dupes.length} Duplicates Available</div></div>
                                                    <button disabled={!canForge} onClick={() => {
                                                        const sacList = dupes.sort(sortItems).reverse().slice(0, 5);
                                                        const bM = sacList.reduce((b,c) => MUTATION_ORDER.indexOf(c.mutation) > MUTATION_ORDER.indexOf(b) ? c.mutation : b, 'none');
                                                        const nI = { id: Math.random().toString(36).substr(2,9), name: MASTER_ITEM_DB.filter(it => it.rarityId === next.id)[0].name, rarity: next, mutation: bM, currency: (Math.random() < next.pearlChance ? 'pearl' : 'dubloon'), cps: next.incomeBase * 1.5, value: next.incomeBase * 200 };
                                                        setInventory(prev => [nI, ...prev.filter(it => !sacList.some(s => s.id === it.id))]);
                                                        setLastPull(nI); setView('shop');
                                                    }} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase ${canForge ? 'bg-fuchsia-600 text-white shadow-lg active:scale-95' : 'bg-slate-800 text-white/20'}`}>Forge {next.label}</button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center gap-10 py-10">
                                        <p className="text-[10px] text-center text-fuchsia-300 opacity-60 uppercase font-black px-4 leading-relaxed max-w-xs">Transfer a mutation from a sacrifice to a target vessel.</p>
                                        <div className="flex items-center gap-6">
                                            <button onClick={() => setInventoryModal('sacrifice')} className={`w-28 h-36 rounded-3xl border-2 border-dashed flex flex-col items-center justify-center gap-3 transition-all ${transferSacrifice ? 'bg-white/5 border-transparent ' + MUTATIONS[transferSacrifice.mutation].glow : 'border-red-500/20 text-red-400/30'}`}>
                                                {transferSacrifice ? <span className="text-4xl">{MASTER_ITEM_DB.find(db => db.name === transferSacrifice.name)?.e}</span> : <Icon name="Flame" size={28} />}
                                                <span className="text-[8px] font-black uppercase text-center px-2">{transferSacrifice ? transferSacrifice.name : 'Sacrifice'}</span>
                                            </button>
                                            <Icon name="Zap" className="text-fuchsia-400 rotate-90" />
                                            <button onClick={() => setInventoryModal('target')} className={`w-28 h-36 rounded-3xl border-2 border-dashed flex flex-col items-center justify-center gap-3 transition-all ${transferTarget ? 'bg-white/5 border-transparent' : 'border-cyan-500/20 text-cyan-400/30'}`}>
                                                {transferTarget ? <span className="text-4xl">{MASTER_ITEM_DB.find(db => db.name === transferTarget.name)?.e}</span> : <Icon name="Box" size={28} />}
                                                <span className="text-[8px] font-black uppercase text-center px-2">{transferTarget ? transferTarget.name : 'Target'}</span>
                                            </button>
                                        </div>
                                        <button disabled={!transferSacrifice || !transferTarget} onClick={() => {
                                            const cost = transferTarget.rarity.transferCost;
                                            if ((cost.curr === 'pearl' ? pearls : dubloons) < cost.amt) return;
                                            if (cost.curr === 'pearl') setPearls(v => v - cost.amt); else setDubloons(v => v - cost.amt);
                                            const nt = { ...transferTarget, mutation: transferSacrifice.mutation };
                                            setInventory(p => [nt, ...p.filter(i => i.id !== transferSacrifice.id && i.id !== transferTarget.id)]);
                                            setTransferSacrifice(null); setTransferTarget(null); setLastPull(nt); setView('shop');
                                        }} className={`w-full max-w-xs py-5 rounded-3xl font-black text-xs uppercase tracking-widest transition-all ${transferSacrifice && transferTarget ? 'bg-fuchsia-600 text-white shadow-lg active:scale-95' : 'bg-slate-900 text-white/20'}`}>Perform Rite</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'shrine' && (
                            <div className="flex-1 flex flex-col gap-10 pb-20 animate-in slide-in-from-left-4">
                                <p className="text-[10px] text-center text-cyan-400 uppercase font-black opacity-60 px-4 leading-relaxed">Manifest guaranteed rarities fused with arcane mutations.</p>
                                {SHRINE_CATEGORIES.map(cat => (
                                    <section key={cat.id} className="space-y-4">
                                        <div className="flex items-center gap-3 px-2">
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br ${cat.color} ${cat.glow}`}><Icon name={cat.icon} size={20} className="text-white" /></div>
                                            <h3 className="font-black text-lg uppercase tracking-tighter">{cat.name}</h3>
                                        </div>
                                        <div className="flex gap-4 overflow-x-auto pb-4 px-2 scroll-smooth snap-x scrollbar-hide">
                                            {RARITIES.map(rarity => {
                                                const cost = rarity.manifestCost * cat.multiplier;
                                                const pk = { ...cat, targetRarity: rarity.id, mutation: cat.id, cost: cost, currency: 'pearl' };
                                                const afford = pearls >= getPackCost(pk);
                                                return (
                                                    <div key={rarity.id} className={`snap-center shrink-0 w-36 flex flex-col items-center group cursor-pointer ${!afford ? 'opacity-30' : ''}`} onClick={() => { if(afford) { openPack(pk); setView('shop'); } }}>
                                                        <div className={`w-full aspect-[4/5] rounded-3xl bg-gradient-to-br ${cat.color} border border-white/20 flex flex-col items-center justify-center gap-2 p-3 shadow-xl ${cat.glow}`}>
                                                            <div className={`text-[10px] font-black uppercase ${rarity.color} drop-shadow-md`}>{rarity.label}</div>
                                                            <div className="flex items-center gap-1 mt-2 font-black text-xs"><span>{formatNum(getPackCost(pk))}</span><Icon name="Droplet" size={10} className="text-cyan-300" /></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>
                                ))}
                                <section className="px-2">
                                    <h3 className="text-[10px] font-black uppercase opacity-30 mb-4 tracking-[0.4em] flex items-center gap-2"><Icon name="Compass" size={14} /> Fleet Upgrades</h3>
                                    <div className="space-y-3">
                                        {[ { id: 'luck', name: "Siren's Grace", icon: 'Wand2', desc: "+20% Luck", lvl: upgrades.luck }, { id: 'discount', name: "Black Market", icon: 'Percent', desc: "-5% Cost", lvl: upgrades.discount }, { id: 'multiplier', name: "Tidal Surge", icon: 'Calculator', desc: "Global Multiplier", lvl: Math.floor(upgrades.multiplier * 2 - 1) } ].map(u => {
                                            const cost = u.id === 'luck' ? (upgrades.luck + 1) * 500 : u.id === 'discount' ? (upgrades.discount + 1) * 1000 : (upgrades.multiplier * 2) * 1250;
                                            return ( <button key={u.id} disabled={pearls < cost} onClick={() => buyUpgrade(u.id)} className="w-full bg-white/5 border border-white/5 p-4 rounded-3xl flex items-center justify-between group active:scale-95 transition-all disabled:opacity-20 text-left"><div className="flex items-center gap-4"><div className="w-14 h-14 rounded-2xl bg-slate-900 border border-white/5 flex items-center justify-center"><Icon name={u.icon} size={24} className="text-teal-400" /></div><div><div className="flex items-center gap-2 font-black text-sm"><span>{u.name}</span><span className="text-[8px] bg-white/10 px-1.5 py-0.5 rounded uppercase">Lvl {u.lvl}</span></div><p className="text-[10px] opacity-50 uppercase tracking-widest">{u.desc}</p></div></div><div className="bg-cyan-500/10 text-cyan-400 px-4 py-2 rounded-xl text-xs font-black">{formatNum(cost)} <Icon name="Droplet" size={12} /></div></button> );
                                        })}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="flex-1 flex flex-col gap-6 animate-in fade-in">
                                <div className="bg-white/5 border border-white/10 p-6 rounded-[2.5rem] flex items-center justify-between shadow-xl">
                                    <div><h3 className="text-2xl font-black uppercase tracking-tighter">Captain's Log</h3><p className="text-[10px] opacity-40 uppercase tracking-widest">{inventory.length} items logged</p></div>
                                    <button onClick={() => {
                                        const ni = []; const g = {}; inventory.forEach(i => { if(!g[i.name]) g[i.name] = []; g[i.name].push(i); });
                                        Object.values(g).forEach(list => { list.sort(sortItems); ni.push(list[0]); list.slice(1).forEach(dup => { const val = dup.value * (MUTATIONS[dup.mutation || 'none']?.mult || 1); if(dup.currency === 'pearl') setPearls(p => p + val); else setDubloons(d => d + val); }); });
                                        setInventory(ni);
                                    }} className="bg-amber-500/20 text-amber-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-amber-500/20 active:scale-95">Clear Dups</button>
                                </div>
                                {RARITIES.map(r => (
                                    <div key={r.id} className="mb-6 px-2">
                                        <h4 className={`text-[10px] font-black uppercase tracking-[0.3em] ${r.color} mb-4`}>{r.label}</h4>
                                        <div className="grid gap-3">
                                            {MASTER_ITEM_DB.filter(m => m.rarityId === r.id).map(dbItem => {
                                                const owned = inventory.filter(i => i.name === dbItem.name).sort(sortItems);
                                                if (!owned.length) return (
                                                    <button key={dbItem.name} onClick={() => { if(pearls >= r.manifestCost) { setPearls(v => v - r.manifestCost); const ni = { id: Math.random().toString(36).substr(2,9), name: dbItem.name, rarity: r, mutation: 'none', currency: (Math.random() < r.pearlChance ? 'pearl' : 'dubloon'), cps: r.incomeBase, value: r.incomeBase * 200 }; setInventory(p => [ni, ...p]); setLastPull(ni); setView('shop'); } }} disabled={pearls < r.manifestCost} className="p-4 rounded-3xl border-2 border-dashed border-white/5 bg-slate-900/40 opacity-40 hover:opacity-100 flex items-center justify-between transition-all group active:scale-95">
                                                        <div className="flex items-center gap-4"><Icon name="Lock" size={16} /><span className="text-[10px] font-black uppercase tracking-widest">{dbItem.name}</span></div>
                                                        <div className="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full text-[10px] font-black group-hover:bg-cyan-500 group-hover:text-white transition-colors">Manifest: {formatNum(r.manifestCost)} <Icon name="Droplet" size={10} /></div>
                                                    </button>
                                                );
                                                const best = owned[0];
                                                return (
                                                    <div key={best.id} className={`p-4 rounded-3xl border flex items-center justify-between ${MUTATIONS[best.mutation].bg} border-white/10 ${MUTATIONS[best.mutation].glow}`}>
                                                        <div className="flex items-center gap-4 truncate"><span className="text-3xl drop-shadow-md">{dbItem.e}</span><div className="text-left truncate">
                                                            <div className="flex items-center gap-2 font-black text-xs text-slate-900"><span>{best.name}</span>{owned.length > 1 && <span className="bg-slate-900 text-white px-2 py-0.5 rounded text-[8px]">x{owned.length}</span>}</div>
                                                            <div className="text-[10px] font-black text-teal-600 flex items-center gap-1">+{formatNum(best.cps * (MUTATIONS[best.mutation]?.mult || 1) * upgrades.multiplier)}/s</div>
                                                        </div></div>
                                                        <button onClick={() => { const it = owned[owned.length-1]; setInventory(v => v.filter(x => x.id !== it.id)); const val = it.value * (MUTATIONS[it.mutation || 'none']?.mult || 1); if(it.currency === 'pearl') setPearls(v => v + val); else setDubloons(v => v + val); }} className="bg-slate-950 text-amber-400 px-3 py-1 rounded-xl text-[9px] font-black uppercase border border-white/10 active:scale-90 transition-transform">Sell</button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {inspectedPack && (
                        <div className="fixed inset-0 z-[500] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-8 animate-in zoom-in-95" onClick={() => setInspectedPack(null)}>
                            <div className="bg-slate-900 w-full max-w-xs rounded-3xl border border-white/10 p-6 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <button className="absolute top-4 right-4 text-white/20 hover:text-white" onClick={() => setInspectedPack(null)}><Icon name="X" size={24} /></button>
                                <h3 className="text-sm font-black uppercase mb-6 tracking-widest text-center">{inspectedPack.name} Rates</h3>
                                <div className="space-y-2">
                                    {(() => {
                                        const luckB = 1 + (upgrades.luck * 0.2);
                                        const weights = {}; Object.keys(inspectedPack.weights).forEach((k, idx) => { weights[k] = inspectedPack.weights[k] * (k === 'trash' ? 1 : Math.pow(luckB, idx)); });
                                        const total = Object.values(weights).reduce((a,b)=>a+b,0);
                                        return RARITIES.map(r => {
                                            const pct = (weights[r.id] || 0) / total * 100;
                                            return pct > 0 ? ( <div key={r.id} className="flex justify-between items-center text-[10px] font-black uppercase"><span className={r.color}>{r.label}</span><span className="opacity-40">{pct.toFixed(2)}%</span></div> ) : null;
                                        }).reverse();
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}

                    {inventoryModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-950/90 backdrop-blur-md flex flex-col p-4 animate-in fade-in" onClick={() => setInventoryModal(null)}>
                            <div className="bg-slate-900 flex-1 rounded-3xl border border-white/10 p-6 flex flex-col overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6"><h3 className="text-sm font-black uppercase text-white tracking-[0.2em]">{inventoryModal === 'sacrifice' ? 'Select Sacrifice' : 'Select Target'}</h3><button onClick={() => setInventoryModal(null)} className="p-2 bg-white/5 rounded-full"><Icon name="X" size={20} /></button></div>
                                <div className="flex-1 overflow-y-auto space-y-3 pr-2 scrollbar-hide">
                                    {inventory.filter(i => inventoryModal === 'sacrifice' ? (i.mutation !== 'none') : (i.id !== (transferSacrifice?.id || ''))).sort(sortItems).map(item => (
                                        <div key={item.id} onClick={() => { if (inventoryModal === 'sacrifice') setTransferSacrifice(item); else setTransferTarget(item); setInventoryModal(null); }} className={`p-4 rounded-3xl flex justify-between items-center bg-white/5 border border-white/5 active:scale-95 cursor-pointer transition-all ${MUTATIONS[item.mutation].glow}`}><div className="flex items-center gap-4"><span className="text-3xl">{MASTER_ITEM_DB.find(db => db.name === item.name)?.e}</span><div><div className="text-xs font-black text-white">{item.name}</div><div className={`text-[9px] font-black uppercase tracking-wider ${MUTATIONS[item.mutation].color}`}>{MUTATIONS[item.mutation].label || 'Base'} • {item.rarity.label}</div></div></div></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="fixed inset-0 pointer-events-none z-[1000] border-[16px] border-white/5 opacity-20" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
