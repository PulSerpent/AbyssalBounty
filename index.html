            const sortItemsThemeAware = (a, b) => {
                const tA = THEMES[a.themeId || 'abyssal'];
                if (a.themeId !== b.themeId) return (a.themeId || 'abyssal').localeCompare(b.themeId || 'abyssal');
                const mutA = tA.MUTATION_ORDER.indexOf(a.mutation || 'none');
                const mutB = tA.MUTATION_ORDER.indexOf(b.mutation || 'none');
                if (mutA !== mutB) return mutB - mutA;
                const rarA = tA.RARITIES.findIndex(r => r.id === a.rarity.id);
                const rarB = tA.RARITIES.findIndex(r => r.id === b.rarity.id);
                return rarB - rarA || a.name.localeCompare(b.name);
            };

            const incomeFlow = useMemo(() => {
                const best = {};
                inventory.forEach(i => { 
                    if(!best[i.name]) {
                        best[i.name] = i;
                    } else {
                        const tData = THEMES[i.themeId || 'abyssal'];
                        const mutA = tData.MUTATION_ORDER.indexOf(i.mutation || 'none');
                        const mutB = tData.MUTATION_ORDER.indexOf(best[i.name].mutation || 'none');
                        if (mutA > mutB) best[i.name] = i;
                    }
                });
                const list = Object.values(best);
                return { 
                    bestItemsList: list, 
                    income: list.reduce((acc, i) => {
                        const tData = THEMES[i.themeId || 'abyssal'];
                        const mutData = tData.MUTATIONS[i.mutation || 'none'];
                        const val = (i.cps || 0) * (mutData?.mult || 1);
                        if(i.currency === 'secondary') acc.c2 += val; else acc.c1 += val;
                        return acc;
                    }, { c1: 0, c2: 0 })
                };
            }, [inventory, currentThemeId]);

            // Determine active multiplier
            const frenzyMultiplier = (frenzyTimer > 0 ? 5 : 1);
            const realmMultiplier = Math.pow(2, unlockedThemes.length - 1);
            const activeMultiplier = frenzyMultiplier * realmMultiplier;

            useEffect(() => {
                const saved = localStorage.getItem('abyssal_v19_realms');
                if (saved) {
                    try {
                        const d = JSON.parse(saved);
                        if(d.currentThemeId) setCurrentThemeId(d.currentThemeId);
                        if(d.unlockedThemes) setUnlockedThemes(d.unlockedThemes);
                        if(d.currency1 !== undefined) setCurrency1(d.currency1);
                        if(d.currency2 !== undefined) setCurrency2(d.currency2);
                        if(d.inventory) setInventory(d.inventory);
                        if(d.claimedSets) setClaimedSets(d.claimedSets);
                    } catch(e) {}
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('abyssal_v19_realms', JSON.stringify({ currentThemeId, unlockedThemes, currency1, currency2, inventory, claimedSets }));
            }, [currentThemeId, unlockedThemes, currency1, currency2, inventory, claimedSets]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrency1(d => d + (incomeFlow.income.c1 * activeMultiplier / 10));
                    setCurrency2(p => p + (incomeFlow.income.c2 * activeMultiplier / 10));
                }, 100);
                return () => clearInterval(timer);
            }, [incomeFlow.income, activeMultiplier]);

            // Global Event Spawner
            useEffect(() => {
                const tick = setInterval(() => {
                    if (!merchantVisible && !merchantSaleActive && Math.random() < 0.03) {
                        const startLeft = Math.random() > 0.5;
                        setMerchantPath({ '--startX': startLeft ? '-150px' : '110vw', '--endX': startLeft ? '110vw' : '-150px', '--startY': `${Math.random() * 70 + 10}vh`, '--endY': `${Math.random() * 70 + 10}vh` });
                        setMerchantVisible(true); setTimeout(() => setMerchantVisible(false), 6000); 
                    }
                    if (!krakenEvent && Math.random() < 0.015) { 
                        setKrakenEvent(true); setKrakenTaps(0); setKrakenTimer(10); setKrakenFeedback(null); 
                    }
                    if (!anomalyVisible && frenzyTimer <= 0 && !krakenEvent && Math.random() < 0.02) {
                        setAnomalyVisible(true);
                        setTimeout(() => setAnomalyVisible(false), 12000);
                    }
                }, 5000);
                return () => clearInterval(tick);
            }, [merchantVisible, merchantSaleActive, krakenEvent, anomalyVisible, frenzyTimer]);

            const getPackCost = (p) => { return merchantSaleActive ? Math.floor(p.cost * 0.25) : p.cost; };

            const openPack = (p) => {
                const cost = getPackCost(p);
                if ((p.currency === 'primary' ? currency1 : currency2) < cost) return;
                setIsOpening(true); setIsSealed(false); setLastPull(null); setActivePack(p);
                if (p.currency === 'primary') setCurrency1(d => d - cost); else setCurrency2(v => v - cost);
                setTimeout(() => {
                    let rarity;
                    if(p.targetRarity) rarity = RARITIES.find(r => r.id === p.targetRarity);
                    else {
                        const weights = p.weights;
                        const total = Object.values(weights).reduce((a,b) => a+b, 0);
                        let rand = Math.random() * total; rarity = RARITIES[0];
                        for(const r of [...RARITIES].reverse()) { if(rand < (weights[r.id] || 0)) { rarity = r; break; } rand -= (weights[r.id] || 0); }
                    }
                    const items = MASTER_ITEM_DB.filter(i => i.rarityId === rarity.id);
                    const item = items[Math.floor(Math.random() * items.length)] || MASTER_ITEM_DB[0];
                    setPendingLoot({ 
                        id: Math.random().toString(36).substr(2, 9), 
                        themeId: currentThemeId,
                        name: item.name, 
                        rarity, 
                        mutation: p.mutation || 'none', 
                        currency: (Math.random() < (rarity.secondaryChance || 0) ? 'secondary' : 'primary'), 
                        cps: rarity.incomeBase * (1 + (STANDARD_PACKS.findIndex(pk => pk.id === (p.id || '')) * 0.3)), 
                        value: Math.floor(rarity.incomeBase * 200) 
                    });
                    setIsOpening(false); setIsSealed(true);
                }, 800);
            };

            const getDuplicatesForRarity = (rId) => {
                const owned = activeInventory.filter(i => i.rarity.id === rId);
                const grp = {}; owned.forEach(i => { if(!grp[i.name]) grp[i.name] = []; grp[i.name].push(i); });
                const d = []; Object.values(grp).forEach(g => { if(g.length > 1) d.push(...g.slice(1)); });
                return d;
            };

            const getTransferCost = (sac, tgt) => {
                if (!sac || !tgt) return 0;
                const tgtRarityIdx = Math.max(0, RARITIES.findIndex(r => r.id === tgt.rarity.id));
                const baseCost = Math.pow(5, tgtRarityIdx) * 50; 
                const mutIdx = Math.max(0, MUTATION_ORDER.indexOf(sac.mutation));
                const mutMult = Math.pow(4, mutIdx);
                return Math.floor(baseCost * mutMult);
            };

            const handleHoldStart = (p) => { isHolding.current = false; holdTimer.current = setTimeout(() => { isHolding.current = true; setInspectedPack(p); }, 500); };
            const handleHoldEnd = (p) => { clearTimeout(holdTimer.current); if(!isHolding.current) openPack(p); };

            const handleRealmSwitch = (themeId) => {
                if (currentThemeId === themeId) return;
                setCurrentThemeId(themeId);
                setTransferSacrifice(null); 
                setTransferTarget(null);
                setLastPull(null);
                setView('shop');
            };

            return (
                <div className={`h-screen w-full flex flex-col ${activeTheme.bgClass} text-white relative overflow-hidden font-sans select-none touch-none transition-colors duration-[2000ms]`}>
                    
                    {/* Theme-Specific Ambience */}
                    <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
                        {[...Array(25)].map((_, i) => (
                            <div 
                                key={i} 
                                className={`absolute ${currentThemeId === 'olympian' ? 'bg-amber-400/40 shadow-[0_0_15px_rgba(251,191,36,0.8)]' : 'bg-white/10 rounded-full'} ${currentThemeId === 'olympian' ? 'animate-[heavenly-drift_linear_infinite]' : 'animate-[float-up_linear_infinite]'}`} 
                                style={{ 
                                    left: `${Math.random() * 100}vw`, 
                                    width: currentThemeId === 'olympian' ? `${Math.random() * 6 + 3}px` : `${Math.random() * 10 + 2}px`, 
                                    height: currentThemeId === 'olympian' ? `${Math.random() * 20 + 20}px` : `${Math.random() * 10 + 2}px`, 
                                    animationDuration: `${Math.random() * 10 + 10}s`, 
                                    animationDelay: `${Math.random() * 10}s`, 
                                    clipPath: currentThemeId === 'olympian' ? 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)' : 'none'
                                }}

                    </div>

                    {/* Frenzy Surge */}
                    {anomalyVisible && (
                        <div className="fixed top-1/3 right-0 z-[60] cursor-pointer animate-[orb-drift_12s_linear_forwards]" onClick={() => { setAnomalyVisible(false); setFrenzyTimer(30); }}>
                            <div className="flex flex-col items-center">
                                <div className={`${currentThemeId === 'olympian' ? 'bg-amber-500/30 border-amber-300 text-amber-100' : 'bg-fuchsia-600/30 border-fuchsia-400 text-fuchsia-100'} backdrop-blur-md px-3 py-1 rounded-full text-[8px] font-black uppercase mb-1 border animate-pulse`}>Frenzy Surge!</div>
                                <div className={`w-16 h-16 rounded-full bg-gradient-to-tr ${currentThemeId === 'olympian' ? 'from-amber-600 to-yellow-300 shadow-[0_0_30px_rgba(251,191,36,0.8)] border-amber-200' : 'from-fuchsia-800 to-indigo-500 shadow-[0_0_30px_rgba(192,38,211,0.8)] border-fuchsia-300'} animate-[void-pulse_2s_ease-in-out_infinite] flex items-center justify-center border-2`}>
                                    <Icon name="ZapFast" className="text-white drop-shadow-[0_0_5px_white]" size={32} />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Merchant Event */}
                    {merchantVisible && (
                        <div className="fixed top-0 left-0 z-[60] cursor-pointer animate-[ghost-drift_6s_linear_forwards]" style={merchantPath} onClick={() => { setMerchantVisible(false); setMerchantSaleActive(true); setMerchantSaleTimer(20); }}>
                            <div className="flex flex-col items-center">
                                <div className="bg-cyan-400/20 backdrop-blur-md px-3 py-1 rounded-full text-[8px] font-black uppercase mb-1 border border-cyan-400/40 animate-pulse text-cyan-300">Tap Fast!</div>
                                <Icon name={currentThemeId === 'olympian' ? 'Sun' : 'Ship'} size={64} className="text-cyan-200/40 drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]" />
                            </div>
                        </div>
                    )}

                    {/* Beast Attack Event */}
                    {krakenEvent && (
                        <div className="fixed inset-0 z-[100] bg-red-950/80 backdrop-blur-sm flex flex-col items-center justify-center animate-in fade-in">
                            <div className="relative z-10 flex flex-col items-center">
                                {krakenFeedback ? (
                                    <div className="bg-slate-900 border-2 border-white/20 p-8 rounded-[3rem] text-center shadow-2xl animate-in zoom-in-50">
                                        <h2 className="text-3xl font-black uppercase text-white mb-2">{krakenFeedback}</h2>
                                        <div className="text-6xl">{terms.beast}</div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center gap-6">
                                        <div className="bg-slate-950/80 border border-red-500/30 p-6 rounded-[2.5rem] text-center backdrop-blur-xl shadow-2xl">
                                            <h2 className="text-2xl font-black uppercase text-red-400 animate-pulse tracking-tighter">Beast Attack!</h2>
                                            <p className="text-[10px] font-black uppercase opacity-60 mb-4">Tap to Fight Back!</p>
                                            <div className="w-64 h-8 bg-slate-900 rounded-full border border-white/10 overflow-hidden relative">
                                                <div className={`h-full bg-gradient-to-r from-red-600 to-${currentThemeId === 'olympian' ? 'amber-500' : 'fuchsia-600'} transition-all duration-300`} style={{ width: `${(krakenTaps / 50) * 100}%` }} />
                                            </div>
                                            <div className="mt-4 text-red-500 text-xl font-mono font-black">{(Math.max(0, krakenTimer)).toFixed(1)}s</div>
                                        </div>
                                        <button onClick={() => { setKrakenTaps(p => { const next = p+1; if(next >= 50) { 
                                            const jackpot = Math.max(100, Math.floor(incomeFlow.income.c2 * 500 + 500 * activeMultiplier));
                                            setCurrency2(v => v + jackpot); setKrakenFeedback(`VICTORY! +${formatNum(jackpot)} ${terms.secondary}`);
                                            setTimeout(() => setKrakenEvent(false), 2000); return 50; } return next; }); }} className="w-48 h-48 rounded-full bg-red-600/20 border-4 border-red-500/40 flex items-center justify-center shadow-xl active:scale-90 transition-transform"><span className="text-2xl font-black text-red-100 uppercase">Push!</span></button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <nav className={`${currentThemeId === 'olympian' ? 'bg-white/80 border-amber-500/20' : 'bg-slate-950/60 border-white/10'} p-4 pt-8 backdrop-blur-xl border-b flex justify-between items-center z-50`}>
                        <div className="flex flex-col gap-1">
                            <div className={`${currentThemeId === 'olympian' ? 'bg-amber-100/50 border-amber-500/10' : 'bg-slate-900/80 border-white/5'} flex items-center gap-2 px-3 py-1.5 rounded-full border w-40 sm:w-48 shadow-inner`}>
                                <Icon name={terms.primaryIcon} size={14} className="text-amber-500 shrink-0" />
                                <span className={`text-xs font-black truncate ${currentThemeId === 'olympian' ? 'text-amber-900' : 'text-white'}`}>{formatNum(currency1)}</span>
                                <span className={`ml-auto text-[9px] font-black ${currentThemeId === 'olympian' ? 'text-amber-600' : 'text-amber-400/60'}`}>+{formatNum(incomeFlow.income.c1 * activeMultiplier)}/s</span>
                            </div>
                            <div className={`${currentThemeId === 'olympian' ? 'bg-cyan-100/50 border-cyan-500/10' : 'bg-slate-900/80 border-white/5'} flex items-center gap-2 px-3 py-1.5 rounded-full border w-40 sm:w-48 shadow-inner`}>
                                <Icon name={terms.secondaryIcon} size={14} className="text-cyan-500 shrink-0" />
                                <span className={`text-xs font-black truncate ${currentThemeId === 'olympian' ? 'text-cyan-900' : 'text-white'}`}>{formatNum(currency2)}</span>
                                <span className={`ml-auto text-[9px] font-black ${currentThemeId === 'olympian' ? 'text-cyan-600' : 'text-cyan-400/60'}`}>+{formatNum(incomeFlow.income.c2 * activeMultiplier)}/s</span>
                            </div>
                        </div>
                        <div className="text-right">
                            <h1 className={`text-[10px] font-black uppercase opacity-60 mb-1 ${currentThemeId === 'olympian' ? 'text-amber-900' : 'text-white'}`}>{activeTheme.name}</h1>
                            {frenzyTimer > 0 ? (
                                <div className={`text-[10px] font-black uppercase animate-pulse ${currentThemeId === 'olympian' ? 'text-amber-500 drop-shadow-[0_0_5px_rgba(251,191,36,0.8)]' : 'text-fuchsia-400 drop-shadow-[0_0_5px_rgba(192,38,211,0.8)]'}`}>
                                    SURGE x{activeMultiplier.toFixed(1)} <span className="opacity-80">({frenzyTimer}s)</span>
                                </div>
                            ) : (
                                <div className={`text-[9px] font-black uppercase ${currentThemeId === 'olympian' ? 'text-amber-600' : 'text-cyan-400'}`}>x{activeMultiplier.toFixed(1)} Yield</div>
                            )}
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto max-w-lg mx-auto w-full p-4 flex flex-col z-10 scrollbar-hide pb-32">
                        <div className="flex gap-1 sm:gap-2 mb-6 sticky top-0 bg-slate-950/80 backdrop-blur px-1 py-2 rounded-2xl z-40 shrink-0 w-full overflow-x-auto scrollbar-hide shadow-2xl">
                            {[ { id: 'shop', icon: 'Anchor', label: terms.packMenu }, { id: 'aquarium', icon: 'Fish', label: terms.display }, { id: 'altar', icon: 'Flame', label: 'Altar' }, { id: 'shrine', icon: 'Sparkles', label: 'Shrine' }, { id: 'inventory', icon: 'ScrollText', label: terms.log }, { id: 'realms', icon: 'Globe', label: 'Realms' } ].map(t => (
                                <button key={t.id} onClick={() => setView(t.id)} className={`flex-1 min-w-[50px] flex flex-col items-center justify-center py-2 rounded-xl transition-all ${view === t.id ? (currentThemeId === 'olympian' ? 'bg-amber-500 text-white shadow-[0_0_15px_rgba(251,191,36,0.5)]' : 'bg-fuchsia-600 text-white shadow-[0_0_15px_rgba(192,38,211,0.5)]') : 'bg-slate-900/40 text-white/50 hover:bg-slate-900/60'}`}><Icon name={t.icon} size={16} /><span className="text-[7.5px] sm:text-[8px] font-black uppercase mt-1 tracking-tighter">{t.label}</span></button>
                            ))}
                        </div>

                        {view === 'realms' && (
                            <div className="flex-1 flex flex-col gap-6 animate-in fade-in slide-in-from-bottom-4">
                                <div className={`bg-slate-900/80 border ${currentThemeId === 'olympian' ? 'border-amber-500/30 shadow-[0_0_30px_rgba(251,191,36,0.15)]' : 'border-fuchsia-500/30 shadow-[0_0_30px_rgba(192,38,211,0.15)]'} p-6 rounded-[3rem] text-center relative overflow-hidden mb-4`}>
                                    <div className={`absolute top-0 left-0 w-full h-full bg-gradient-to-b ${currentThemeId === 'olympian' ? 'from-amber-500/20' : 'from-fuchsia-600/10'} to-transparent pointer-events-none`}></div>
                                    <Icon name="Globe" size={48} className={`${currentThemeId === 'olympian' ? 'text-amber-500 drop-shadow-[0_0_15px_rgba(251,191,36,0.6)]' : 'text-fuchsia-500 drop-shadow-[0_0_15px_rgba(192,38,211,0.6)]'} mx-auto mb-4 relative z-10`} />
                                    <h2 className="text-2xl font-black uppercase tracking-tighter text-white mb-2 relative z-10">Realms of Power</h2>
                                    <p className={`text-[10px] uppercase font-black opacity-80 leading-relaxed relative z-10 ${currentThemeId === 'olympian' ? 'text-amber-200' : 'text-fuchsia-200'}`}>
                                        Travel to alternate realities. Your wealth transfers seamlessly. Each new realm features escalating challenges and distinct relics, providing a permanent global multiplier for discovering it!
                                    </p>
                                </div>

                                <div className="space-y-4 px-2">
                                    {Object.values(THEMES).map(th => {
                                        const isUnlocked = unlockedThemes.includes(th.id);
                                        const isActive = currentThemeId === th.id;
                                        return (
                                            <div key={th.id} className={`p-5 rounded-3xl border-2 flex items-center justify-between transition-all ${isActive ? 'bg-white/10 border-white/50 shadow-xl' : isUnlocked ? 'bg-white/5 border-white/10' : 'bg-black/50 border-white/5 opacity-70'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${isActive ? 'bg-white text-slate-900' : 'bg-slate-800 text-white/50'}`}>
                                                        <Icon name={th.icon} size={24} />
                                                    </div>
                                                    <div>
                                                        <div className="text-sm font-black uppercase tracking-wider text-white">{th.name}</div>
                                                        <div className="text-[9px] font-black uppercase opacity-50 mt-1">
                                                            {isActive ? 'Current Reality' : isUnlocked ? 'Discovered' : 'Unknown Dimension'}
                                                        </div>
                                                    </div>
                                                </div>
                                                {isActive ? (
                                                    <div className="text-[10px] font-black uppercase bg-white/20 px-4 py-2 rounded-xl text-white">Active</div>
                                                ) : isUnlocked ? (
                                                    <button onClick={() => handleRealmSwitch(th.id)} className={`text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase active:scale-95 transition-transform shadow-lg ${currentThemeId === 'olympian' ? 'bg-amber-500' : 'bg-fuchsia-600'}`}>Travel</button>
                                                ) : (
                                                    <div className="flex flex-col items-end gap-1">
                                                        <div className="text-[10px] font-black uppercase text-red-400">Locked</div>
                                                        <div className="text-[8px] font-black uppercase opacity-50 text-right">Requires 100 {terms.primary}</div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'shop' && (
                            <div className="flex-1 flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-4">
                                <div className="flex gap-4 overflow-x-auto pb-4 px-2 scrollbar-hide">
                                    {STANDARD_PACKS.map(p => {
                                        const cost = getPackCost(p);
                                        const afford = (p.currency === 'primary' ? currency1 : currency2) >= cost;
                                        return (
                                            <div key={p.id} className={`snap-center shrink-0 w-32 flex flex-col items-center group cursor-pointer ${!afford ? 'opacity-30' : ''}`}
                                                onMouseDown={() => handleHoldStart(p)} onMouseUp={() => handleHoldEnd(p)} onMouseLeave={() => clearTimeout(holdTimer.current)}
                                                onTouchStart={() => handleHoldStart(p)} onTouchEnd={() => handleHoldEnd(p)}
                                            >
                                                <div className={`w-full aspect-[4/5] rounded-3xl bg-gradient-to-br ${p.color} border border-white/20 flex flex-col items-center justify-center gap-2 p-3 shadow-xl ${p.glow}`}>
                                                    <Icon name={p.icon} size={28} className="text-white drop-shadow-md" />
                                                    <span className="text-[8px] font-black text-center uppercase opacity-80 text-white">{p.name}</span>
                                                    <div className="flex items-center gap-1 font-black text-xs">
                                                        {p.cost > 0 ? ( <><span className={merchantSaleActive ? 'text-cyan-300' : 'text-white'}>{formatNum(cost)}</span><Icon name={p.currency === 'primary' ? terms.primaryIcon : terms.secondaryIcon} size={10} className={p.currency === 'primary' ? 'text-amber-400' : 'text-cyan-300'} /></> ) : <span className="text-green-400">FREE</span>}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className={`${currentThemeId === 'olympian' ? 'bg-white/40 border-amber-500/20 shadow-inner' : 'bg-white/5 border-white/10'} flex-1 min-h-[350px] flex items-center justify-center rounded-[3rem] border relative overflow-hidden transition-all backdrop-blur-sm`}>
                                    {isOpening && <div className="animate-pulse flex flex-col items-center gap-4"><div className={`w-16 h-16 rounded-full ${currentThemeId === 'olympian' ? 'bg-amber-500/20 border-amber-500' : 'bg-cyan-500/20 border-cyan-500'} border-2 flex items-center justify-center animate-spin`}><Icon name="Zap" className={currentThemeId === 'olympian' ? "text-amber-500" : "text-cyan-400"} /></div><span className={`text-xs font-black uppercase ${currentThemeId === 'olympian' ? 'text-amber-600' : 'text-cyan-400'}`}>Summoning...</span></div>}
                                    {isSealed && (
                                        <div className="flex flex-col items-center gap-6 cursor-pointer group" onClick={() => {
                                            if(isRipping || isShaking) return; setIsShaking(true);
                                            setTimeout(() => { setIsShaking(false); setIsRipping(true);
                                                setTimeout(() => { setInventory(v => [pendingLoot, ...v]); setLastPull(pendingLoot); setPendingLoot(null); setIsSealed(false); setIsRipping(false); }, 700);
                                            }, pendingLoot.rarity.id === 'trash' ? 400 : 1200);
                                        }}>
                                            <div className={`w-44 h-60 rounded-2xl border-4 border-white/20 shadow-2xl relative transition-all bg-gradient-to-br ${activePack?.color || 'from-slate-800 to-slate-900'} ${isShaking ? 'animate-[shake_0.15s_infinite]' : 'animate-bounce-slow'} ${activePack?.mutation && activePack?.mutation !== 'none' ? 'animate-ritual' : ''}`}>

                                <div className="space-y-2">
                                    {(() => {
                                        const weights = inspectedPack.weights;
                                        const total = Object.values(weights).reduce((a,b)=>a+b,0);
                                        return RARITIES.map(r => {
                                            const pct = (weights[r.id] || 0) / total * 100;
                                            return pct > 0 ? ( <div key={r.id} className="flex justify-between items-center text-[10px] font-black uppercase"><span className={r.color}>{r.label}</span><span className="opacity-40">{pct.toFixed(2)}%</span></div> ) : null;
                                        }).reverse();
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}

                    {inventoryModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-950/90 backdrop-blur-md flex flex-col p-4 animate-in fade-in" onClick={() => setInventoryModal(null)}>
                            <div className="bg-slate-900 flex-1 rounded-3xl border border-white/10 p-6 flex flex-col overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6"><h3 className="text-sm font-black uppercase text-white tracking-[0.2em]">{inventoryModal === 'sacrifice' ? 'Select Catalyst' : 'Select Target'}</h3><button onClick={() => setInventoryModal(null)} className="p-2 bg-white/5 rounded-full"><Icon name="X" size={20} /></button></div>
                                <div className="flex-1 overflow-y-auto space-y-3 pr-2 scrollbar-hide">
                                    {activeInventory.filter(i => inventoryModal === 'sacrifice' ? (i.mutation !== 'none') : (i.id !== (transferSacrifice?.id || ''))).sort(sortItemsThemeAware).map(item => (
                                        <div key={item.id} onClick={() => { if (inventoryModal === 'sacrifice') setTransferSacrifice(item); else setTransferTarget(item); setInventoryModal(null); }} className={`p-4 rounded-3xl flex justify-between items-center bg-white/5 border border-white/5 active:scale-95 cursor-pointer transition-all ${MUTATIONS[item.mutation].glow}`}><div className="flex items-center gap-4"><span className="text-3xl">{MASTER_ITEM_DB.find(db => db.name === item.name)?.e}</span><div><div className="text-xs font-black text-white">{item.name}</div><div className={`text-[9px] font-black uppercase tracking-wider ${MUTATIONS[item.mutation].color}`}>{MUTATIONS[item.mutation].label || 'Base'} • {item.rarity.label}</div></div></div></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="fixed inset-0 pointer-events-none z-[1000] border-[16px] border-white/5 opacity-20" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
