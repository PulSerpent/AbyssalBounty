            { id: 'leviathan', name: 'Leviathan Hoard', cost: 1500000000, currency: 'dubloon', icon: 'Skull', color: 'from-zinc-800 to-black', glow: 'shadow-white/10',
                weights: { trash: 0.001, common: 0.01, uncommon: 0.1, rare: 1, epic: 10, legendary: 45, mythic: 30, celestial: 11, primordial: 2.5, transcendent: 0.389 } },
            { id: 'reliquary', name: 'Abyssal Reliquary', cost: 85000000000, currency: 'dubloon', icon: 'Zap', color: 'from-violet-800 to-black', glow: 'shadow-violet-500/30',
                weights: { trash: 0.0001, common: 0.001, uncommon: 0.01, rare: 0.1, epic: 1.5, legendary: 10, mythic: 40, celestial: 35, primordial: 11, transcendent: 2.3889 } },
            { id: 'atlantis', name: 'Atlantis Core', cost: 5000000000000, currency: 'dubloon', icon: 'Boxes', color: 'from-blue-600 to-black', glow: 'shadow-cyan-400/40',
                weights: { trash: 0.00001, common: 0.0001, uncommon: 0.001, rare: 0.01, epic: 0.1, legendary: 1.5, mythic: 10, celestial: 40, primordial: 35, transcendent: 13.38889 } },
        ];

        const SHRINE_CATEGORIES = [
            { id: 'glimmering', name: 'Glimmer Shards', icon: 'Sparkles', multiplier: 2, color: 'from-yellow-600 to-yellow-900', glow: 'shadow-yellow-500/20' },
            { id: 'bioluminescent', name: 'Bioluminescence', icon: 'Zap', multiplier: 5, color: 'from-lime-600 to-lime-900', glow: 'shadow-lime-500/20' },
            { id: 'abyssal', name: 'Abyssal Depths', icon: 'Anchor', multiplier: 25, color: 'from-violet-700 to-indigo-950', glow: 'shadow-violet-500/20' },
            { id: 'prismatic', name: 'Prismatic Tide', icon: 'Sparkles', multiplier: 150, color: 'from-fuchsia-600 to-rose-950', glow: 'shadow-fuchsia-500/20' },
            { id: 'ethereal', name: 'Ethereal Ascension', icon: 'Waves', multiplier: 750, color: 'from-cyan-400 to-blue-900', glow: 'shadow-cyan-400/20' }
        ];

        const getDynamicWeights = (pack, luckLvl) => {
            const base = pack.weights;
            if (!base) return { trash: 100 };
            const luckBonus = 1 + (luckLvl * 0.2);
            const newWeights = {};
            const keys = Object.keys(base);
            // Apply luck exponentially to higher rarities
            keys.forEach((k, idx) => {
                const mult = k === 'trash' ? 1 : Math.pow(luckBonus, idx);
                newWeights[k] = base[k] * mult;
            });
            return newWeights;
        };

        const AquariumEntity = ({ item }) => {
            const dbItem = MASTER_ITEM_DB.find(db => db.name === item.name);
            const [pos, setPos] = useState({ x: Math.random() * 80 + 10, y: Math.random() * 80 + 10 });
            const [dir, setDir] = useState(Math.random() > 0.5 ? 1 : -1);

            useEffect(() => {
                const interval = setInterval(() => {
                    setPos(p => {
                        let newX = p.x + (Math.random() - 0.5) * 5;
                        let newY = p.y + (Math.random() - 0.5) * 5;
                        if (newX < 10 || newX > 90) setDir(d => -d);
                        return { x: Math.max(10, Math.min(90, newX)), y: Math.max(10, Math.min(90, newY)) };
                    });
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className={`absolute transition-all duration-[3000ms] ease-in-out pointer-events-none drop-shadow-2xl flex flex-col items-center ${MUTATIONS[item.mutation]?.glow || ''}`} style={{ left: `${pos.x}%`, top: `${pos.y}%`, transform: `scale(${dir}, 1)` }}>
                    <span className="text-4xl animate-[drift_8s_ease-in-out_infinite]">{dbItem?.e || '🐟'}</span>
                </div>
            );
        };

        const App = () => {
            const [dubloons, setDubloons] = useState(100);
            const [pearls, setPearls] = useState(0);
            const [inventory, setInventory] = useState([]);
            const [view, setView] = useState('shop');
            const [upgrades, setUpgrades] = useState({ luck: 0, discount: 0, multiplier: 1 });
            const [isOpening, setIsOpening] = useState(false);
            const [isSealed, setIsSealed] = useState(false);
            const [isRipping, setIsRipping] = useState(false);
            const [isShaking, setIsShaking] = useState(false);
            const [activePack, setActivePack] = useState(null);
            const [pendingLoot, setPendingLoot] = useState(null);
            const [lastPull, setLastPull] = useState(null);
            const [claimedSets, setClaimedSets] = useState([]);
            const [expandedRewardRarity, setExpandedRewardRarity] = useState(null);
            const [altarMode, setAltarMode] = useState('ascend');
            const [transferSacrifice, setTransferSacrifice] = useState(null);
            const [transferTarget, setTransferTarget] = useState(null);
            const [inventoryModal, setInventoryModal] = useState(null);
            const [inspectedPack, setInspectedPack] = useState(null);
            const [merchantVisible, setMerchantVisible] = useState(false);
            const [merchantSaleActive, setMerchantSaleActive] = useState(false);
            const [merchantSaleTimer, setMerchantSaleTimer] = useState(0);
            const [krakenEvent, setKrakenEvent] = useState(false);
            const [krakenTaps, setKrakenTaps] = useState(0);
            const [krakenTimer, setKrakenTimer] = useState(0);
            const [krakenFeedback, setKrakenFeedback] = useState(null);

            const holdTimer = useRef(null);
            const isHolding = useRef(false);
            const touchStartY = useRef(0);

            const sortItems = (a, b) => {
                const mutA = MUTATION_ORDER.indexOf(a.mutation || 'none');
                const mutB = MUTATION_ORDER.indexOf(b.mutation || 'none');
                if (mutA !== mutB) return mutB - mutA;
                const rarA = RARITIES.findIndex(r => r.id === a.rarity.id);
                const rarB = RARITIES.findIndex(r => r.id === b.rarity.id);
                if (rarA !== rarB) return rarB - rarA;
                return a.name.localeCompare(b.name);
            };

            useEffect(() => {
                const saved = localStorage.getItem('abyssal_v13_save');
                if (saved) {
                    try {
                        const d = JSON.parse(saved);
                        if(typeof d.dubloons === 'number') setDubloons(d.dubloons);
                        if(typeof d.pearls === 'number') setPearls(d.pearls);
                        if(Array.isArray(d.inventory)) setInventory(d.inventory);
                        if(d.upgrades) setUpgrades(prev => ({...prev, ...d.upgrades}));
                        if(Array.isArray(d.claimedSets)) setClaimedSets(d.claimedSets);
                    } catch(e) {}
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('abyssal_v13_save', JSON.stringify({ dubloons, pearls, inventory, upgrades, claimedSets }));
            }, [dubloons, pearls, inventory, upgrades, claimedSets]);

            const incomeFlow = useMemo(() => {
                const bestItems = {};
                inventory.forEach(item => {
                    const itemName = item.name;
                    if (!bestItems[itemName] || sortItems(item, bestItems[itemName]) < 0) {
                        bestItems[itemName] = item;
                    }
                });
                const list = Object.values(bestItems);
                const totals = list.reduce((acc, item) => {
                    const itemMut = item.mutation || 'none';
                    const mult = MUTATIONS[itemMut]?.mult || 1;
                    const val = (item.cps || 0) * mult;
                    if (item.currency === 'pearl') acc.pearls += val;
                    else acc.dubloons += val;
                    return acc;
                }, { dubloons: 0, pearls: 0 });
                return { income: totals, bestItemsList: list };
            }, [inventory]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setDubloons(d => d + (incomeFlow.income.dubloons * upgrades.multiplier / 10));
                    setPearls(p => p + (incomeFlow.income.pearls * upgrades.multiplier / 10));
                }, 100);
                return () => clearInterval(timer);
            }, [incomeFlow.income, upgrades.multiplier]);

            useEffect(() => {
                const encounterTick = setInterval(() => {
                    if (!merchantVisible && !merchantSaleActive && Math.random() < 0.03) {
                        setMerchantVisible(true);
                        setTimeout(() => setMerchantVisible(false), 15000); 
                    }
                    if (!krakenEvent && Math.random() < 0.01) triggerKrakenEvent();
                }, 5000);
                return () => clearInterval(encounterTick);
            }, [merchantVisible, merchantSaleActive, krakenEvent]);

            useEffect(() => {
                let saleTimer;
                if (merchantSaleActive && merchantSaleTimer > 0) {
                    saleTimer = setInterval(() => {
                        setMerchantSaleTimer(prev => prev <= 1 ? 0 : prev - 1);
                        if (merchantSaleTimer <= 1) setMerchantSaleActive(false);
                    }, 1000);
                }
                return () => clearInterval(saleTimer);
            }, [merchantSaleActive, merchantSaleTimer]);

            const activateMerchantSale = () => {
                setMerchantVisible(false); setMerchantSaleActive(true); setMerchantSaleTimer(60);
            };

            const triggerKrakenEvent = () => {
                setKrakenEvent(true); setKrakenTaps(0); setKrakenTimer(10); setKrakenFeedback(null);
            };

            const handleKrakenTap = () => {
                if (!krakenEvent) return;
                setKrakenTaps(prev => {
                    const next = prev + 1;
                    if (next >= 50) { winKraken(); return 50; }
                    return next;
                });
            };

            const winKraken = () => {
                const jackpot = Math.max(100, Math.floor(incomeFlow.income.pearls * 500 + 500 * upgrades.multiplier));
                setPearls(p => p + jackpot);
                setKrakenFeedback(`VICTORY! +${formatNum(jackpot)} Pearls`);
                setTimeout(() => setKrakenEvent(false), 2000);
            };

            const failKraken = () => {
                setKrakenFeedback("THE KRAKEN ESCAPED...");
                setTimeout(() => setKrakenEvent(false), 2000);
            };

            useEffect(() => {
                let kt;
                if (krakenEvent && !krakenFeedback) {
                    kt = setInterval(() => {
                        setKrakenTimer(prev => {
                            if (prev <= 0.1) { failKraken(); return 0; }
                            return prev - 0.1;
                        });
                    }, 100);
                }
                return () => clearInterval(kt);
            }, [krakenEvent, krakenFeedback]);

            const getPackCost = (p) => {
                let base = p.currency === 'dubloon' ? Math.floor(p.cost * (1 - (upgrades.discount * 0.05))) : p.cost;
                if (merchantSaleActive) return Math.floor(base * 0.25); 
                return base;
            };

            const handleHoldStart = (p) => {
                isHolding.current = false;
                holdTimer.current = setTimeout(() => {
                    isHolding.current = true;
                    setInspectedPack(p);
                }, 500);
            };

            const handleHoldEnd = (p) => {
                clearTimeout(holdTimer.current);
                if (!isHolding.current) {
                    openPack(p);
                }
            };

            const createItem = (name, rarity, mutation, pack) => {
                const isPearl = Math.random() < (rarity.pearlChance || 0);
                const currency = isPearl ? 'pearl' : 'dubloon';
                const tierIdx = pack ? STANDARD_PACKS.findIndex(p => p.id === pack.id) : 4; 
                const cpsBase = rarity.incomeBase * (tierIdx === -1 ? 1 : (tierIdx * 0.3 + 1));
                return { id: Math.random().toString(36).substr(2, 9), name, rarity, mutation: mutation || 'none', currency, cps: cpsBase, value: Math.floor(cpsBase * 200) };
            };

            const openPack = (pack) => {
                const cost = getPackCost(pack);
                const balance = pack.currency === 'dubloon' ? dubloons : pearls;
                if (balance < cost) return;

                setIsOpening(true); setIsSealed(false); setLastPull(null); setActivePack(pack);
                if (pack.currency === 'dubloon') setDubloons(d => d - cost);
                else setPearls(p => p - cost);

                setTimeout(() => {
                    let rarity;
                    if (pack.targetRarity) {
                        rarity = RARITIES.find(r => r.id === pack.targetRarity);
                    } else {
                        const weights = getDynamicWeights(pack, upgrades.luck);
                        const total = Object.values(weights).reduce((a, b) => a + b, 0);
                        let rand = Math.random() * total;
                        rarity = RARITIES[0];
                        for (const r of [...RARITIES].reverse()) {
                            const w = weights[r.id] || 0;
                            if (w > 0 && rand < w) { rarity = r; break; }
                            rand -= w;
                        }
                    }
                    const items = MASTER_ITEM_DB.filter(i => i.rarityId === rarity.id);
                    const item = items[Math.floor(Math.random() * items.length)] || MASTER_ITEM_DB[0];
                    setPendingLoot(createItem(item.name, rarity, pack.mutation || 'none', pack));
                    setIsOpening(false); setIsSealed(true);
                }, 800);
            };

            const ripTape = () => {
                if (isRipping || isShaking) return;
                setIsShaking(true);
                const rarityId = pendingLoot.rarity.id;
                const shakeTime = Math.min(rarityId === 'trash' ? 400 : 1000, 3000);
                setTimeout(() => {
                    setIsShaking(false); setIsRipping(true);
                    setTimeout(() => {
                        setInventory(prev => [pendingLoot, ...prev]);
                        setLastPull(pendingLoot); setPendingLoot(null); setIsSealed(false); setIsRipping(false);
                    }, 700); 
                }, shakeTime);
            };

            const sellItem = (item) => {
                const total = item.value * (MUTATIONS[item.mutation || 'none']?.mult || 1);
                if (item.currency === 'pearl') setPearls(p => p + total); else setDubloons(d => d + total);
                setInventory(inv => inv.filter(i => i.id !== item.id));
                if (lastPull?.id === item.id) setLastPull(null);
            };

            const sellAllDuplicates = () => {
                let dIn = 0, pIn = 0;
                const newInv = [];
                const groups = {};
                inventory.forEach(i => { if(!groups[i.name]) groups[i.name] = []; groups[i.name].push(i); });
                Object.values(groups).forEach(g => {
                    g.sort(sortItems); newInv.push(g[0]);
                    for(let i=1; i<g.length; i++){
                        const dup = g[i];
                        const v = dup.value * (MUTATIONS[dup.mutation || 'none']?.mult || 1);
                        if(dup.currency === 'pearl') pIn += v; else dIn += v;
                    }
                });
                setDubloons(d => d + dIn); setPearls(p => p + pIn); setInventory(newInv);
            };

            const buyUpgrade = (type) => {
                const cost = type === 'luck' ? (upgrades.luck + 1) * 500 : type === 'discount' ? (upgrades.discount + 1) * 1000 : (upgrades.multiplier * 2) * 1250;
                if (pearls < cost) return;
                setPearls(p => p - cost);
                setUpgrades(prev => ({ ...prev, [type]: type === 'multiplier' ? prev.multiplier + 0.5 : prev[type] + 1 }));
            };

            const getDuplicatesForRarity = (rarityId) => {
                const owned = inventory.filter(i => i.rarity.id === rarityId);
                const groups = {};
                owned.forEach(i => { if(!groups[i.name]) groups[i.name] = []; groups[i.name].push(i); });
                const dupes = [];
                Object.values(groups).forEach(g => { if (g.length > 1) { g.sort(sortItems); dupes.push(...g.slice(1)); } });
                return dupes;
            };

            const handleAscend = (currentRarityId, nextRarity) => {
                const dupes = getDuplicatesForRarity(currentRarityId);
                if (dupes.length < 5) return;
                const worst5 = dupes.sort(sortItems).reverse().slice(0, 5);
                let bestMutIdx = 0;
                worst5.forEach(i => { const idx = MUTATION_ORDER.indexOf(i.mutation || 'none'); if (idx > bestMutIdx) bestMutIdx = idx; });
                const newItem = createItem(MASTER_ITEM_DB.filter(i => i.rarityId === nextRarity.id)[0].name, nextRarity, MUTATION_ORDER[bestMutIdx], null);
                setInventory(prev => [newItem, ...prev.filter(i => !worst5.map(w => w.id).includes(i.id))]);
                setLastPull(newItem); setView('shop');
            };

            const handleTransfer = () => {
                if (!transferSacrifice || !transferTarget) return;
                const costObj = transferTarget.rarity.transferCost;
                const balance = costObj.curr === 'pearl' ? pearls : dubloons;
                if (balance < costObj.amt) return;
                if (costObj.curr === 'pearl') setPearls(p => p - costObj.amt); else setDubloons(d => d - costObj.amt);
                const newTarget = { ...transferTarget, mutation: transferSacrifice.mutation };
                setInventory(prev => [newTarget, ...prev.filter(i => i.id !== transferSacrifice.id && i.id !== transferTarget.id)]);
                setTransferSacrifice(null); setTransferTarget(null); setLastPull(newTarget); setView('shop');
            };

            const getSetProgress = (rarityId, targetMut) => {
                const itemsInSet = MASTER_ITEM_DB.filter(m => m.rarityId === rarityId);
                const targetMutIndex = MUTATION_ORDER.indexOf(targetMut);
                let count = 0;
                itemsInSet.forEach(dbItem => {
                    const owned = inventory.filter(i => i.name === dbItem.name);
                    if (owned.length > 0 && Math.max(...owned.map(i => MUTATION_ORDER.indexOf(i.mutation || 'none'))) >= targetMutIndex) count++;
                });
                return { count, total: itemsInSet.length };
            };

            const claimSetPrize = (rarity, mutKey) => {
                const claimId = `${rarity.id}-${mutKey}`;
                if (claimedSets.includes(claimId)) return;
                const progress = getSetProgress(rarity.id, mutKey);
                if (progress.count < progress.total) return;
                const amount = rarity.setPrize.amt * (MUTATIONS[mutKey].mult || 1);
                if (rarity.setPrize.curr === 'pearl') setPearls(p => p + amount); else setDubloons(d => d + amount);
                setClaimedSets(prev => [...prev, claimId]);
            };

            const buySpecificItem = (dbItem, rarity) => {
                if (pearls < rarity.manifestCost) return;
                setPearls(p => p - rarity.manifestCost);
                const newItem = createItem(dbItem.name, rarity, 'none', null);
                setInventory(prev => [newItem, ...prev]); setLastPull(newItem); setView('shop');
            };

            return (
                <div className="h-screen w-full flex flex-col bg-slate-950 text-white relative overflow-hidden font-sans select-none touch-none">
                    {/* Background Bubbles */}
                    <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden bg-gradient-to-b from-cyan-950 via-blue-950 to-slate-950">
                        {[...Array(20)].map((_, i) => (
                            <div key={i} className="absolute rounded-full bg-white/10 animate-[float-up_linear_infinite]" style={{ left: `${Math.random() * 100}vw`, width: `${Math.random() * 10 + 2}px`, height: `${Math.random() * 10 + 2}px`, animationDuration: `${Math.random() * 10 + 10}s`, animationDelay: `${Math.random() * 10}s`, opacity: Math.random() * 0.5 }} />
                        ))}
                    </div>

                    {/* Merchant / Events */}
                    {merchantVisible && (
                        <div className="fixed top-1/4 left-0 z-[60] cursor-pointer animate-[ghost-drift_15s_linear_forwards]" onClick={activateMerchantSale}>
                            <div className="flex flex-col items-center">
                                <div className="bg-cyan-400/20 backdrop-blur-md px-3 py-1 rounded-full text-[8px] font-black uppercase mb-1 border border-cyan-400/40 animate-pulse text-cyan-300">Tap Merchant!</div>
                                <Icon name="Ship" size={64} className="text-cyan-200/40 drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]" />
                            </div>
                        </div>
                    )}

                    {krakenEvent && (
                        <div className="fixed inset-0 z-[100] bg-red-950/20 backdrop-blur-sm flex flex-col items-center justify-center animate-in fade-in">
                            <div className="relative z-10 flex flex-col items-center">
                                {krakenFeedback ? (
                                    <div className="bg-slate-900 border-2 border-white/20 p-8 rounded-[3rem] text-center shadow-2xl">
                                        <h2 className="text-3xl font-black uppercase mb-2">{krakenFeedback}</h2>
                                        <div className="text-6xl">🐙</div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center gap-6">
                                        <div className="bg-slate-950/80 border border-red-500/30 p-6 rounded-[2.5rem] text-center">
                                            <h2 className="text-2xl font-black uppercase text-red-400 animate-pulse">Kraken Frenzy!</h2>
                                            <div className="w-64 h-8 bg-slate-900 rounded-full border border-white/10 overflow-hidden relative my-4">
                                                <div className="h-full bg-gradient-to-r from-red-600 to-fuchsia-600 transition-all duration-300" style={{ width: `${(krakenTaps / 50) * 100}%` }} />
                                            </div>
                                            <div className="text-red-500 text-xl font-black">{krakenTimer.toFixed(1)}s</div>
                                        </div>
                                        <button onClick={handleKrakenTap} className="w-48 h-48 rounded-full bg-red-600/20 border-4 border-red-500/40 flex items-center justify-center shadow-xl active:scale-90 transition-transform">PUSH!</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Navbar */}
                    <nav className="p-4 pt-8 bg-white/5 backdrop-blur-xl border-b border-white/10 flex justify-between items-center z-50">
                        <div className="flex flex-col gap-1">
                            <div className="flex items-center gap-2 bg-slate-900/80 px-3 py-1.5 rounded-full border border-white/5 w-40 sm:w-48">
                                <Icon name="Coins" size={14} className="text-amber-400 shrink-0" />
                                <span className="text-xs font-black truncate">{formatNum(dubloons)}</span>
                                <span className="ml-auto text-[9px] font-black text-amber-400/60">+{formatNum(incomeFlow.income.dubloons * upgrades.multiplier)}/s</span>
                            </div>
                            <div className="flex items-center gap-2 bg-slate-900/80 px-3 py-1.5 rounded-full border border-white/5 w-40 sm:w-48">
                                <Icon name="Droplet" size={14} className="text-cyan-400 shrink-0" />
                                <span className="text-xs font-black truncate">{formatNum(pearls)}</span>
                                <span className="ml-auto text-[9px] font-black text-cyan-400/60">+{formatNum(incomeFlow.income.pearls * upgrades.multiplier)}/s</span>
                            </div>
                        </div>
                        <div className="text-right">
                            <h1 className="text-[10px] font-black uppercase opacity-40 tracking-widest">Abyssal Bounty</h1>
                            <div className="text-[9px] font-black text-cyan-400 uppercase">x{upgrades.multiplier.toFixed(1)} Yield</div>
                        </div>
                    </nav>

                    {/* Main Section */}
                    <main className="flex-1 overflow-y-auto max-w-lg mx-auto w-full p-4 flex flex-col z-10 scrollbar-hide pb-32">
                        <div className="flex gap-2 mb-6 sticky top-0 bg-slate-950/80 backdrop-blur px-1 py-2 rounded-2xl z-40">
                            {[ { id: 'shop', icon: 'Anchor', label: 'Dive' }, { id: 'aquarium', icon: 'Fish', label: 'Trench' }, { id: 'altar', icon: 'Flame', label: 'Altar' }, { id: 'shrine', icon: 'Sparkles', label: 'Shrine' }, { id: 'inventory', icon: 'ScrollText', label: 'Log' } ].map(t => (
                                <button key={t.id} onClick={() => setView(t.id)} className={`flex-1 flex flex-col items-center justify-center py-2.5 rounded-xl transition-all ${view === t.id ? 'bg-white text-slate-950 shadow-lg' : 'bg-white/5 text-white/50 hover:bg-white/10'}`}><Icon name={t.icon} size={18} /><span className="text-[8px] font-black uppercase mt-1">{t.label}</span></button>
                            ))}
                        </div>

                        {view === 'shop' && (
                            <div className="flex-1 flex flex-col gap-4 animate-in fade-in">
                                <div className="flex gap-4 overflow-x-auto pb-4 px-2 scrollbar-hide">
                                    {STANDARD_PACKS.map(p => {
                                        const cost = getPackCost(p);
                                        const balance = p.currency === 'dubloon' ? dubloons : pearls;
                                        const affordable = balance >= cost;
                                        return (
                                            <div key={p.id} className={`snap-center shrink-0 w-32 flex flex-col items-center group cursor-pointer ${!affordable ? 'opacity-30' : ''}`}
                                                onMouseDown={() => handleHoldStart(p)}
                                                onMouseUp={() => handleHoldEnd(p)}
                                                onMouseLeave={() => clearTimeout(holdTimer.current)}
                                                onTouchStart={(e) => { touchStartY.current = e.touches[0].clientY; handleHoldStart(p); }}
                                                onTouchEnd={() => handleHoldEnd(p)}
                                            >
                                                <div className={`w-full aspect-[4/5] rounded-3xl bg-gradient-to-br ${p.color} border border-white/20 flex flex-col items-center justify-center gap-2 p-3 transition-all shadow-xl ${p.glow}`}>
                                                    <Icon name={p.icon} size={28} className="text-white drop-shadow-md" />
                                                    <span className="text-[8px] font-black uppercase text-white">{p.name}</span>
                                                    <div className="flex items-center gap-1">
                                                        <span className="text-xs font-black">{formatNum(cost)}</span>
                                                        {p.currency === 'dubloon' ? <Icon name="Coins" size={10} className="text-amber-400" /> : <Icon name="Droplet" size={10} className="text-cyan-300" />}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className={`flex-1 min-h-[350px] flex items-center justify-center bg-white/5 rounded-[3rem] border border-white/10 relative overflow-hidden transition-all duration-500`}>
                                    {isOpening && <div className="animate-pulse flex flex-col items-center gap-4"><div className="w-16 h-16 rounded-full bg-cyan-500/20 border-2 border-cyan-500 flex items-center justify-center animate-spin"><Icon name="Anchor" className="text-cyan-400" /></div><span className="text-xs font-black text-cyan-400">Diving Deeper...</span></div>}
                                    {isSealed && (
                                        <div className="flex flex-col items-center gap-6 cursor-pointer" onClick={ripTape}>
                                            <div className={`w-44 h-60 rounded-2xl border-4 border-white/20 shadow-2xl relative transition-all bg-gradient-to-br ${activePack?.color || 'from-slate-800 to-slate-900'} ${isShaking ? 'animate-[shake_0.15s_infinite]' : 'animate-bounce-slow'}`}>
                                                <div className="absolute top-12 left-0 right-0 h-16 flex items-center justify-center z-10">
                                                    <div className="relative w-full h-full">
                                                        <div className={`absolute inset-0 bg-cyan-400 flex items-center justify-center ${isRipping ? '-translate-y-16 opacity-0' : ''}`}><span className="text-[10px] font-black uppercase text-slate-950">Sealed Cache</span></div>
                                                    </div>
                                                </div>
                                                <div className="absolute bottom-4 left-0 right-0 text-center opacity-30"><Icon name={activePack?.icon} className="mx-auto" size={48} /></div>
                                            </div>
                                            {!isShaking && !isRipping && <div className="bg-cyan-500 px-8 py-4 rounded-full font-black text-sm uppercase">Rip Open</div>}
                                        </div>
                                    )}
                                    {lastPull && !isSealed && (
                                        <div className={`w-full h-full flex flex-col items-center justify-center p-8 text-center animate-in zoom-in-75 ${lastPull.rarity.bg}`}>
                                            <div className="flex gap-2 mb-4"><span className={`text-[9px] font-black px-4 py-1.5 rounded-full border bg-white/95 ${lastPull.rarity.color}`}>{lastPull.rarity.label}</span></div>
                                            <div className="text-7xl mb-6 drop-shadow-2xl">{MASTER_ITEM_DB.find(db => db.name === lastPull.name)?.e || '🐟'}</div>
                                            <h2 className="text-4xl font-black mb-2 tracking-tighter">{lastPull.name}</h2>
                                            <div className="flex items-center gap-2 bg-slate-950/40 px-4 py-2 rounded-full mb-8">+{formatNum(lastPull.cps * MUTATIONS[lastPull.mutation].mult)}/s</div>
                                            <button onClick={() => setLastPull(null)} className="w-full bg-white text-slate-950 py-4 rounded-2xl font-black text-xs active:scale-95 transition-all">Keep</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'aquarium' && (
                            <div className="flex-1 min-h-[500px] flex flex-col relative bg-slate-900/50 rounded-[3rem] border border-white/5 overflow-hidden">
                                <div className="flex-1 relative w-full h-full">{incomeFlow.bestItemsList.map(item => <AquariumEntity key={item.id} item={item} />)}</div>
                            </div>
                        )}

                        {view === 'altar' && (
                            <div className="flex-1 flex flex-col gap-6 animate-in slide-in-from-right-4">
                                <div className="flex bg-white/5 p-1.5 rounded-2xl border border-white/5 shrink-0">
                                    <button onClick={() => setAltarMode('ascend')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase ${altarMode === 'ascend' ? 'bg-fuchsia-600 text-white' : 'text-white/40'}`}>Ascension</button>
                                    <button onClick={() => setAltarMode('transfer')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase ${altarMode === 'transfer' ? 'bg-fuchsia-600 text-white' : 'text-white/40'}`}>Transfer</button>
                                </div>
                                {altarMode === 'ascend' ? (
                                    <div className="space-y-4">
                                        {RARITIES.slice(0, -1).map((r, idx) => {
                                            const dupes = getDuplicatesForRarity(r.id);
                                            const next = RARITIES[idx + 1];
                                            const canForge = dupes.length >= 5;
                                            return (
                                                <div key={r.id} className="bg-white/5 border border-white/5 p-5 rounded-3xl flex items-center justify-between">
                                                    <div>
                                                        <div className={`text-xs font-black uppercase ${r.color}`}>{r.label}</div>
                                                        <div className="text-[9px] font-black text-white/30 uppercase mt-1">{dupes.length} Duplicates</div>
                                                    </div>
                                                    <button disabled={!canForge} onClick={() => handleAscend(r.id, next)} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase ${canForge ? 'bg-fuchsia-600 text-white shadow-lg active:scale-95' : 'bg-slate-800 text-white/20'}`}>Forge {next.label}</button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center gap-10">
                                        <div className="flex items-center gap-6">
                                            <button onClick={() => setInventoryModal('sacrifice')} className={`w-28 h-36 rounded-3xl border-2 border-dashed flex flex-col items-center justify-center gap-3 ${transferSacrifice ? 'bg-white/5 border-transparent ' + MUTATIONS[transferSacrifice.mutation].glow : 'border-red-500/20 text-red-400/30'}`}>
                                                {transferSacrifice ? <span className="text-4xl">{MASTER_ITEM_DB.find(db => db.name === transferSacrifice.name)?.e}</span> : <Icon name="Flame" size={28} />}
                                                <span className="text-[8px] font-black uppercase">Sacrifice</span>
                                            </button>
                                            <Icon name="Zap" className="text-fuchsia-400 rotate-90" />
                                            <button onClick={() => setInventoryModal('target')} className={`w-28 h-36 rounded-3xl border-2 border-dashed flex flex-col items-center justify-center gap-3 ${transferTarget ? 'bg-white/5 border-transparent' : 'border-cyan-500/20 text-cyan-400/30'}`}>
                                                {transferTarget ? <span className="text-4xl">{MASTER_ITEM_DB.find(db => db.name === transferTarget.name)?.e}</span> : <Icon name="Box" size={28} />}
                                                <span className="text-[8px] font-black uppercase">Target</span>
                                            </button>
                                        </div>
                                        <button disabled={!transferSacrifice || !transferTarget} onClick={handleTransfer} className={`w-full py-5 rounded-3xl font-black text-xs uppercase ${transferSacrifice && transferTarget ? 'bg-fuchsia-600 text-white' : 'bg-slate-900 text-white/20'}`}>Perform Rite</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'shrine' && (
                            <div className="flex-1 flex flex-col gap-10 animate-in slide-in-from-left-4 pb-20">
                                {SHRINE_CATEGORIES.map(cat => (
                                    <section key={cat.id} className="space-y-4">
                                        <div className="flex items-center gap-3 px-2">
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br ${cat.color} ${cat.glow}`}><Icon name={cat.icon} size={20} /></div>
                                            <h3 className="font-black text-lg uppercase">{cat.name}</h3>
                                        </div>
                                        <div className="flex gap-4 overflow-x-auto pb-4 px-2 scrollbar-hide">
                                            {RARITIES.map(rarity => {
                                                const packCost = rarity.manifestCost * cat.multiplier;
                                                const pack = { ...cat, targetRarity: rarity.id, mutation: cat.id, cost: packCost, currency: 'pearl' };
                                                const affordable = pearls >= getPackCost(pack);
                                                return (
                                                    <div key={rarity.id} className={`snap-center shrink-0 w-36 flex flex-col items-center group cursor-pointer ${!affordable ? 'opacity-30' : ''}`} 
                                                        onMouseDown={() => handleHoldStart(pack)}
                                                        onMouseUp={() => handleHoldEnd(pack)}
                                                        onMouseLeave={() => clearTimeout(holdTimer.current)}
                                                        onTouchStart={(e) => { touchStartY.current = e.touches[0].clientY; handleHoldStart(pack); }}
                                                        onTouchEnd={() => handleHoldEnd(pack)}
                                                    >
                                                        <div className={`w-full aspect-[4/5] rounded-3xl bg-gradient-to-br ${cat.color} border border-white/20 flex flex-col items-center justify-center gap-2 p-3 transition-all shadow-xl ${cat.glow}`}>
                                                            <div className={`text-[10px] font-black uppercase ${rarity.color}`}>{rarity.label}</div>
                                                            <div className="flex items-center gap-1 mt-2">
                                                                <span className="text-xs font-black">{formatNum(getPackCost(pack))}</span>
                                                                <Icon name="Droplet" size={10} className="text-cyan-300" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>
                                ))}
                                <section>
                                    <h3 className="text-[10px] font-black uppercase opacity-30 mb-4 px-2">Fleet Upgrades</h3>
                                    <div className="space-y-3">
                                        {[ { id: 'luck', name: "Siren's Grace", icon: 'Wand2', lvl: upgrades.luck }, { id: 'discount', name: "Black Market", icon: 'Percent', lvl: upgrades.discount }, { id: 'multiplier', name: "Tidal Surge", icon: 'Calculator', lvl: Math.floor(upgrades.multiplier * 2 - 1) } ].map(u => {
                                            const cost = u.id === 'luck' ? (upgrades.luck + 1) * 500 : u.id === 'discount' ? (upgrades.discount + 1) * 1000 : (upgrades.multiplier * 2) * 1250;
                                            return ( <button key={u.id} disabled={pearls < cost} onClick={() => buyUpgrade(u.id)} className="w-full bg-white/5 border border-white/5 p-4 rounded-3xl flex items-center justify-between transition-all disabled:opacity-20"><div className="flex items-center gap-4 text-left"><Icon name={u.icon} size={24} className="text-teal-400" /><div><h4 className="font-black text-sm">{u.name} (Lvl {u.lvl})</h4></div></div><div className="bg-cyan-500/10 text-cyan-400 px-4 py-2 rounded-xl text-xs font-black">{formatNum(cost)} <Icon name="Droplet" size={12} /></div></button> );
                                        })}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="flex-1 flex flex-col gap-6 animate-in fade-in">
                                <div className="bg-white/5 border border-white/10 p-6 rounded-[2.5rem] flex items-center justify-between">
                                    <div><h3 className="text-2xl font-black uppercase">Captain's Log</h3><p className="text-[10px] uppercase opacity-40">{inventory.length} Entries</p></div>
                                    <button onClick={sellAllDuplicates} className="bg-amber-500/20 text-amber-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-amber-500/20 active:scale-95 transition-all">Clear Dups</button>
                                </div>
                                {RARITIES.map(r => {
                                    const itemsOfRarity = inventory.filter(i => i.rarity.id === r.id);
                                    if (!itemsOfRarity.length) return null;
                                    const isExpanded = expandedRewardRarity === r.id;
                                    return (
                                        <div key={r.id} className="mb-6">
                                            <div className="flex justify-between items-center mb-4 px-2">
                                                <h4 className={`text-[10px] font-black uppercase tracking-[0.3em] ${r.color}`}>{r.label}</h4>
                                                <button onClick={() => setExpandedRewardRarity(isExpanded ? null : r.id)} className="px-4 py-1.5 rounded-full text-[9px] font-black uppercase border border-white/10 bg-white/5">{isExpanded ? 'Hide Prizes' : 'Set Prizes'}</button>
                                            </div>
                                            {isExpanded && (
                                                <div className="grid gap-2 mb-6 animate-in slide-in-from-top-2">
                                                    {MUTATION_ORDER.map(mutKey => {
                                                        const prog = getSetProgress(r.id, mutKey);
                                                        const isClaimed = claimedSets.includes(`${r.id}-${mutKey}`);
                                                        const canClaim = prog.count >= prog.total && !isClaimed;
                                                        return (
                                                            <div key={mutKey} className="bg-slate-900 border border-white/5 p-3 rounded-2xl flex justify-between items-center">
                                                                <div className="text-left"><span className={`text-[10px] font-black uppercase ${MUTATIONS[mutKey].color}`}>{MUTATIONS[mutKey].label || 'Base'} Set</span><div className="text-[9px] opacity-30">{prog.count}/{prog.total} Found</div></div>
                                                                <button disabled={!canClaim} onClick={() => claimSetPrize(r, mutKey)} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase ${isClaimed ? 'bg-slate-800 text-white/20' : canClaim ? 'bg-amber-500 text-slate-950' : 'bg-white/5 text-white/20'}`}>{isClaimed ? 'Claimed' : 'Claim Prize'}</button>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                            <div className="grid gap-3">
                                                {itemsOfRarity.map(item => (
                                                    <div key={item.id} className={`p-4 rounded-3xl border flex items-center justify-between ${MUTATIONS[item.mutation].bg} border-white/10 ${MUTATIONS[item.mutation].glow}`}>
                                                        <div className="flex items-center gap-4 truncate"><span className="text-3xl drop-shadow-md">{MASTER_ITEM_DB.find(db => db.name === item.name)?.e}</span><div className="text-left truncate"><h5 className="font-black text-xs text-slate-900 truncate">{item.name}</h5><div className="text-[10px] font-black text-teal-600">+{formatNum(item.cps * MUTATIONS[item.mutation].mult)}/s</div></div></div>
                                                        <button onClick={() => sellItem(item)} className="bg-slate-950 text-amber-400 px-3 py-1 rounded-xl text-[9px] font-black uppercase active:scale-90 transition-transform">Sell</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Pack Probability Modal (Restored Hold Function) */}
                    {inspectedPack && (
                        <div className="fixed inset-0 z-[500] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-8 animate-in zoom-in-95" onClick={() => setInspectedPack(null)}>
                            <div className="bg-slate-900 w-full max-w-xs rounded-3xl border border-white/10 p-6 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <button className="absolute top-4 right-4 text-white/20" onClick={() => setInspectedPack(null)}><Icon name="X" size={24} /></button>
                                <h3 className="text-sm font-black uppercase mb-6 tracking-widest text-center">{inspectedPack.name} Probabilities</h3>
                                <div className="space-y-3">
                                    {(() => {
                                        const weights = getDynamicWeights(inspectedPack, upgrades.luck);
                                        const total = Object.values(weights).reduce((a, b) => a + b, 0);
                                        return RARITIES.map(r => {
                                            const weight = weights[r.id] || 0;
                                            if (weight <= 0 && r.id !== 'trash') return null;
                                            const percent = (weight / total * 100);
                                            return (
                                                <div key={r.id} className="flex justify-between items-center text-[10px] font-black uppercase">
                                                    <span className={r.color}>{r.label}</span>
                                                    <span className="opacity-40">{percent < 0.01 ? '<0.01%' : percent.toFixed(2) + '%'}</span>
                                                </div>
                                            );
                                        }).reverse();
                                    })()}
                                </div>
                                <div className="mt-8 text-center"><span className="text-[8px] font-black text-cyan-400 uppercase opacity-40 tracking-widest">Luck Bonus: +{upgrades.luck * 20}%</span></div>
                            </div>
                        </div>
                    )}

                    {/* Altar Inventory Modal */}
                    {inventoryModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-950/90 backdrop-blur-md flex flex-col p-4 animate-in fade-in" onClick={() => setInventoryModal(null)}>
                            <div className="bg-slate-900 flex-1 rounded-3xl border border-white/10 p-6 flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6"><h3 className="text-sm font-black uppercase">{inventoryModal === 'sacrifice' ? 'Select Sacrifice' : 'Select Target'}</h3><button onClick={() => setInventoryModal(null)}><Icon name="X" size={20} /></button></div>
                                <div className="flex-1 overflow-y-auto space-y-3 scrollbar-hide">
                                    {inventory.filter(i => inventoryModal === 'sacrifice' ? (i.mutation !== 'none') : (i.id !== transferSacrifice?.id)).sort(sortItems).map(item => (
                                        <div key={item.id} onClick={() => { if (inventoryModal === 'sacrifice') setTransferSacrifice(item); else setTransferTarget(item); setInventoryModal(null); }} className={`p-4 rounded-3xl flex justify-between items-center bg-white/5 border border-white/5 active:scale-95 cursor-pointer ${MUTATIONS[item.mutation].glow}`}><div className="flex items-center gap-4"><span className="text-3xl">{MASTER_ITEM_DB.find(db => db.name === item.name)?.e}</span><div><div className="text-xs font-black">{item.name}</div><div className={`text-[9px] font-black uppercase ${MUTATIONS[item.mutation].color}`}>{MUTATIONS[item.mutation].label || 'Base'} • {item.rarity.label}</div></div></div></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <div className="fixed inset-0 pointer-events-none z-[1000] border-[16px] border-white/5 opacity-20" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
