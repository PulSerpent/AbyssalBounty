    <!-- Robust Firebase Cloud Database Modules Injection -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FirebaseAPI = { 
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, 
            getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query 
        };
        // Dispatch event so React knows exactly when Firebase is ready to roll
        window.dispatchEvent(new Event('firebase-modules-ready'));
    </script>

        @keyframes ink-fade {

        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { background-color: #020617; margin: 0; overflow: hidden; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .animate-ritual { animation: ritual-glow 2s ease-in-out infinite; }

            if (n === undefined || n === null || isNaN(n)) return "0";
            if (n > 0 && n < 1) return Number(n.toFixed(2)).toString();
            if (n < 1000) return Math.floor(n).toString();
            const power = Math.floor(Math.log10(n));
            const suffixIndex = Math.floor(power / 3);
            const suffixes = ['', 'k', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No'];
            
            if (suffixIndex < suffixes.length) {
                return (n / Math.pow(10, suffixIndex * 3)).toFixed(2) + suffixes[suffixIndex];
            }
            
            const aaIndex = suffixIndex - suffixes.length;
            const letter = String.fromCharCode(97 + (aaIndex % 26));
            const repeat = Math.floor(aaIndex / 26) + 2;

                                                            {best.currency === 'secondary' ? (
                                                                <div className="flex items-center gap-1.5 mt-0.5">
                                                                    <div className={`text-[8px] font-black ${currentThemeId === 'canopy' ? 'text-lime-700' : 'text-amber-700'} flex items-center gap-0.5`}>+{formatNum(best.cps * (mData.mult || 1))}/s <Icon name={terms.primaryIcon} size={8} /></div>
                                                                    <div className={`text-[8px] font-black ${currentThemeId === 'canopy' ? 'text-emerald-700' : 'text-teal-700'} flex items-center gap-0.5`}>+{formatNum(best.cps * (mData.mult || 1) * 0.3)}/s <Icon name={terms.secondaryIcon} size={8} /></div>
                                                                </div>
                                                            ) : (
                                                                <div className={`text-[8px] font-black ${currentThemeId === 'canopy' ? 'text-lime-700' : 'text-amber-700'} flex items-center gap-0.5 mt-0.5`}>+{formatNum(best.cps * (mData.mult || 1))}/s <Icon name={terms.primaryIcon} size={8} /></div>
                                                            )}
                                                        </div></div>
                                                        <div className="flex items-center gap-1.5 justify-end shrink-0">
                                                            <button disabled={!canAffordBuy} onClick={() => handleDirectBuy(dbItem, r, directCost)} className={`px-2 py-1 rounded-lg text-[8px] font-black uppercase flex items-center gap-1 transition-transform active:scale-90 ${canAffordBuy ? (currentThemeId === 'canopy' ? 'bg-emerald-600 text-white shadow-md' : (currentThemeId === 'olympian' ? 'bg-sky-600 text-white shadow-md' : 'bg-cyan-600 text-white shadow-md')) : 'bg-black/40 text-white/30'}`}>
                                                                Buy {formatNum(directCost)} <Icon name={terms.secondaryIcon} size={8} />
                                                            </button>
                                                            <button disabled={owned.length <= 1} onClick={() => { const it = owned[owned.length-1]; setInventory(v => v.filter(x => x.id !== it.id)); const val = (it.value || 0) * (mData.mult || 1); if(it.currency === 'secondary') { setCurrency2(v => v + val*0.3); setCurrency1(v => v + val); } else { setCurrency1(v => v + val); } }} className={`bg-slate-950 text-amber-400 px-2 py-1 rounded-lg text-[8px] font-black uppercase shrink-0 transition-transform active:scale-90 shadow-md ${owned.length <= 1 ? 'opacity-50 grayscale' : ''}`}>Exchange 1</button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'altar' && (
                            <div className="flex-1 flex flex-col gap-4 animate-in slide-in-from-right-4">
                                <div className="flex bg-slate-900/40 p-1 rounded-xl border border-white/10 shrink-0 backdrop-blur">
                                    <button onClick={() => setAltarMode('ascend')} className={`flex-1 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${altarMode === 'ascend' ? (currentThemeId === 'olympian' ? 'bg-amber-500 text-white shadow-lg' : (currentThemeId === 'canopy' ? 'bg-lime-600 text-white shadow-lg' : 'bg-fuchsia-600 text-white shadow-lg')) : 'text-white/40'}`}>Ascension</button>
                                    <button onClick={() => setAltarMode('transfer')} className={`flex-1 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${altarMode === 'transfer' ? (currentThemeId === 'olympian' ? 'bg-amber-500 text-white shadow-lg' : (currentThemeId === 'canopy' ? 'bg-lime-600 text-white shadow-lg' : 'bg-fuchsia-600 text-white shadow-lg')) : 'text-white/40'}`}>Transfer</button>
                                </div>
                                {altarMode === 'ascend' ? (
                                    <div className="space-y-2.5">
                                        <p className={`text-[9px] text-center opacity-60 uppercase font-black px-2 leading-relaxed ${currentThemeId === 'olympian' ? 'text-amber-900' : (currentThemeId === 'canopy' ? 'text-lime-300' : 'text-fuchsia-300')}`}>Combine 5 duplicates of the same rarity to forge an item of the next tier. You are guaranteed a new, undiscovered item unless you have found them all!</p>
                                        {RARITIES.slice(0, -1).map((r, idx) => {
                                            const dupes = getDuplicatesForRarity(r.id);
                                            const next = RARITIES[idx + 1];
                                            const canForge = dupes.length >= 5;
                                            return (
                                                <div key={r.id} className={`${currentThemeId === 'olympian' ? 'bg-white/60' : 'bg-white/5'} border border-white/5 p-4 rounded-2xl flex items-center justify-between transition-all hover:bg-white/10 group`}>
                                                    <div><div className={`text-[10px] font-black uppercase ${r.color}`}>{r.label}</div><div className={`text-[8px] font-black uppercase ${currentThemeId === 'olympian' ? 'text-amber-900/40' : 'text-white/30'}`}>{dupes.length} Duplicates Available</div></div>
                                                    <button disabled={!canForge} onClick={() => {
                                                        const sacList = dupes.sort(sortItemsThemeAware).reverse().slice(0, 5);
                                                        const bM = sacList.reduce((b,c) => MUTATION_ORDER.indexOf(c.mutation) > MUTATION_ORDER.indexOf(b) ? c.mutation : b, 'none');
                                                        const isSec = Math.random() < next.secondaryChance;
                                                        
                                                        const nextItems = MASTER_ITEM_DB.filter(it => it.rarityId === next.id);
                                                        const ownedNextItemNames = new Set(activeInventory.filter(i => i.rarity?.id === next.id).map(i => i.name));
                                                        const unownedNextItems = nextItems.filter(it => !ownedNextItemNames.has(it.name));
                                                        
                                                        const randomItem = unownedNextItems.length > 0 
                                                            ? unownedNextItems[Math.floor(Math.random() * unownedNextItems.length)] 
                                                            : nextItems[Math.floor(Math.random() * nextItems.length)];

                                                        const nI = { id: Math.random().toString(36).substr(2,9), themeId: currentThemeId, name: randomItem.name, rarity: next, mutation: bM, currency: isSec ? 'secondary' : 'primary', cps: next.incomeBase * 1.5, value: next.incomeBase * 200 };
                                                        setInventory(prev => [nI, ...prev.filter(it => !sacList.some(s => s.id === it.id))]);
                                                        setLastPull(nI); setView('shop');
                                                    }} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase ${canForge ? (currentThemeId === 'olympian' ? 'bg-amber-500 text-white shadow-lg active:scale-95' : (currentThemeId === 'canopy' ? 'bg-lime-600 text-white shadow-lg active:scale-95' : 'bg-fuchsia-600 text-white shadow-lg active:scale-95')) : 'bg-slate-800 text-white/20'}`}>Forge {next.label}</button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center gap-6 py-6">
                                        <p className={`text-[9px] text-center opacity-60 uppercase font-black px-2 leading-relaxed max-w-xs ${currentThemeId === 'olympian' ? 'text-amber-900' : (currentThemeId === 'canopy' ? 'text-lime-300' : 'text-fuchsia-300')}`}>Transfer a mutation from a source material to a target vessel.</p>
                                        <div className="flex items-center gap-4">
                                            <button onClick={() => setInventoryModal('source')} className={`w-24 h-32 rounded-2xl border-2 border-dashed flex flex-col items-center justify-center gap-2 transition-all ${transferSacrifice ? 'bg-white/5 border-transparent ' + getMutData(currentThemeId, transferSacrifice.mutation).glow : 'border-red-500/20 text-red-400/30'}`}>
                                                {transferSacrifice ? <span className="text-3xl">{getDbItem(transferSacrifice.name).e}</span> : <Icon name="Flame" size={20} />}
                                                <span className="text-[7.5px] font-black uppercase text-center px-1">{transferSacrifice ? transferSacrifice.name : 'Material'}</span>
                                            </button>
                                            <Icon name="Zap" size={14} className={`${currentThemeId === 'olympian' ? 'text-amber-600' : (currentThemeId === 'canopy' ? 'text-lime-400' : 'text-fuchsia-400')} rotate-90`} />
                                            <button onClick={() => setInventoryModal('target')} className={`w-24 h-32 rounded-2xl border-2 border-dashed flex flex-col items-center justify-center gap-2 transition-all ${transferTarget ? 'bg-white/5 border-transparent' : (currentThemeId === 'canopy' ? 'border-emerald-500/20 text-emerald-400/30' : 'border-cyan-500/20 text-cyan-400/30')}`}>
                                                {transferTarget ? <span className="text-3xl">{getDbItem(transferTarget.name).e}</span> : <Icon name="Box" size={20} />}
                                                <span className="text-[7.5px] font-black uppercase text-center px-1">{transferTarget ? transferTarget.name : 'Target'}</span>
                                            </button>
                                        </div>
                                        {transferSacrifice && transferTarget && (
                                            <div className="bg-slate-950/50 border border-cyan-500/30 px-4 py-2 rounded-xl flex items-center gap-2 shadow-inner">
                                                <span className={`text-[9px] font-black uppercase ${currentThemeId === 'canopy' ? 'text-emerald-400' : 'text-cyan-400'}`}>Fusion Cost:</span>
                                                <span className={`text-xs font-black flex items-center gap-1 ${currency2 >= getTransferCost(transferSacrifice, transferTarget) ? 'text-white' : 'text-red-400'}`}>
                                                    {formatNum(getTransferCost(transferSacrifice, transferTarget))} <Icon name={terms.secondaryIcon} size={10} className={`${currency2 >= getTransferCost(transferSacrifice, transferTarget) ? (currentThemeId === 'canopy' ? 'text-emerald-400' : 'text-cyan-400') : 'text-red-400'}`} />
                                                </span>
                                            </div>
                                        )}
                                        <button disabled={!transferSacrifice || !transferTarget || currency2 < getTransferCost(transferSacrifice, transferTarget)} onClick={() => {
                                            const cost = getTransferCost(transferSacrifice, transferTarget);
                                            if (currency2 < cost) return;
                                            setCurrency2(v => v - cost);
                                            const nt = { ...transferTarget, mutation: transferSacrifice.mutation };
                                            setInventory(p => [nt, ...p.filter(i => i.id !== transferSacrifice.id && i.id !== transferTarget.id)]);
                                            setTransferSacrifice(null); setTransferTarget(null); setLastPull(nt); setView('shop');
                                        }} className={`w-full max-w-[200px] py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${transferSacrifice && transferTarget && currency2 >= getTransferCost(transferSacrifice, transferTarget) ? (currentThemeId === 'olympian' ? 'bg-amber-500 text-white shadow-lg active:scale-95' : (currentThemeId === 'canopy' ? 'bg-lime-600 text-white shadow-lg active:scale-95' : 'bg-fuchsia-600 text-white shadow-lg active:scale-95')) : 'bg-slate-900 text-white/20'}`}>Perform Synthesis</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'shrine' && (
                            <div className="flex-1 flex flex-col gap-3 animate-in fade-in slide-in-from-left-4">
                                <div className={`${currentThemeId === 'olympian' ? 'bg-white/90 border-amber-950/10 shadow-md' : 'bg-slate-950/60 border-white/5'} backdrop-blur px-3 py-1.5 rounded-lg mx-auto w-fit border shadow-lg shrink-0`}>
                                    <p className={`text-[9px] text-center uppercase font-black opacity-90 leading-relaxed ${currentThemeId === 'olympian' ? 'text-amber-900' : (currentThemeId === 'canopy' ? 'text-lime-300' : 'text-cyan-400')}`}>Manifest pure arcane mutations. You will receive a random item that you already own, imbued with the chosen mutation.</p>
                                </div>
                                <div className="flex gap-2 sm:gap-3 overflow-x-auto pb-2 px-1 scrollbar-hide">
                                    {SHRINE_CATEGORIES.map((cat, idx) => {
                                        const equalWeights = {};
                                        RARITIES.forEach(r => equalWeights[r.id] = 10);
                                        const baseCost = (currentThemeId === 'olympian' ? 5e15 : (currentThemeId === 'canopy' ? 5e23 : 50000)) * Math.pow(50, idx); 
                                        
                                        const pk = { id: `shrine_${cat.id}`, name: `${cat.name} Shrine`, isShrine: true, targetRarity: null, mutation: cat.id, cost: baseCost, currency: 'secondary', weights: equalWeights, color: cat.color, glow: cat.glow, icon: cat.icon };
                                        const discountedCost = getPackCost(pk, true);
                                        const isUnlocked = idx === 0 || claimedSets.some(s => s.startsWith(currentThemeId + '_') && s.endsWith('_' + MUTATION_ORDER[idx]));
                                        
                                        // The player must own at least one item to use a shrine
                                        const ownedItemNames = [...new Set(activeInventory.map(i => i.name))];
                                        const afford = isUnlocked && currency2 >= discountedCost && ownedItemNames.length > 0;
                                        
                                        return (
                                            <div key={cat.id} className={`snap-center shrink-0 w-24 sm:w-28 flex flex-col items-center group cursor-pointer ${!afford ? 'opacity-40 grayscale-[50%]' : ''}`}
                                                onMouseDown={() => { if(isUnlocked) handleHoldStart(pk); }} onMouseUp={() => { if(isUnlocked) handleHoldEnd(pk); }} onMouseLeave={() => clearTimeout(holdTimer.current)}
                                                onTouchStart={() => { if(isUnlocked) handleHoldStart(pk); }} onTouchMove={handleHoldMove} onTouchEnd={() => { if(isUnlocked) handleHoldEnd(pk); }}>
                                                <div className={`w-full aspect-[4/5] rounded-2xl bg-gradient-to-br ${cat.color} border-2 flex flex-col items-center justify-center gap-1 p-2 shadow-2xl relative overflow-hidden ${cat.glow} ${currentThemeId === 'olympian' ? 'border-amber-950 shadow-amber-900/60' : 'border-white/20'}`}>
                                                    <div className={`absolute inset-0 ${currentThemeId === 'olympian' ? 'bg-white opacity-20' : 'bg-transparent'} pointer-events-none`} />
                                                    {!isUnlocked && <div className="absolute inset-0 bg-black/60 z-20 flex flex-col items-center justify-center p-2 text-center backdrop-blur-sm"><Icon name="Lock" className="text-white/50 mb-1" size={14} /><span className="text-[6px] font-black uppercase text-white/50 tracking-widest leading-tight">Requires {MUTATION_ORDER[idx]} Set</span></div>}
                                                    <Icon name={cat.icon} size={20} className="text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.7)] z-10" />
                                                    <span className="text-[7px] font-black text-center uppercase text-white z-10 drop-shadow-[0_2px_2px_rgba(0,0,0,0.9)] px-1 leading-none mt-1">{cat.name}</span>
                                                    <div className="flex items-center gap-1 font-black text-[9px] z-10 bg-black/60 px-1.5 py-0.5 rounded-full border border-white/20 shadow-inner mt-1">
                                                        <span className={merchantSaleActive && isUnlocked ? (currentThemeId === 'canopy' ? 'text-emerald-300 animate-pulse' : 'text-cyan-300 animate-pulse') : 'text-white'}>{formatNum(discountedCost)}</span>
                                                        <Icon name={terms.secondaryIcon} size={8} className={currentThemeId === 'canopy' ? "text-emerald-400" : "text-cyan-300"} />
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className={`text-center opacity-50 text-[8px] font-black uppercase tracking-widest shrink-0 ${currentThemeId === 'olympian' ? 'text-slate-900' : 'text-white'}`}>Hold to Inspect Rates</div>
                                {renderUnboxingArea()}
                            </div>
                        )}
                    </main>

                    {inspectedPack && (
                        <div className="fixed inset-0 z-[500] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6 sm:p-8 animate-in zoom-in-95" onClick={() => setInspectedPack(null)}>
                            <div className="bg-slate-900 w-full max-w-xs rounded-[2rem] sm:rounded-3xl border-2 border-white/20 p-5 sm:p-6 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <button className="absolute top-3 right-3 sm:top-4 sm:right-4 text-white/20 hover:text-white transition-colors" onClick={() => setInspectedPack(null)}><Icon name="X" size={20} className="sm:scale-125" /></button>
                                <h3 className="text-xs sm:text-sm font-black uppercase mb-4 sm:mb-6 tracking-widest text-center text-white">{inspectedPack.name} Rates</h3>
                                <div className="space-y-1 sm:space-y-2">
                                    {inspectedPack.isShrine ? (
                                        <div className="flex justify-center items-center py-4 opacity-60 text-[10px] sm:text-xs font-black uppercase text-center text-white">
                                            Grants a random item you<br/>have already discovered.
                                        </div>
                                    ) : (() => {
                                        const weights = inspectedPack.weights;
                                        const total = Object.values(weights).reduce((a,b)=>a+b,0);
                                        return RARITIES.map(r => {
                                            const pct = (weights[r.id] || 0) / total * 100;
                                            return pct > 0 ? ( <div key={r.id} className="flex justify-between items-center text-[9px] sm:text-[11px] font-black uppercase border-b border-white/5 pb-1"><span className={r.color}>{r.label}</span><span className="text-white opacity-40 font-mono">{pct.toFixed(1)}%</span></div> ) : null;
                                        }).reverse();
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}

                    {tradeTarget && (
                        <div className="fixed inset-0 z-[600] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6 sm:p-8 animate-in zoom-in-95" onClick={() => setTradeTarget(null)}>
                            <div className="bg-slate-900 w-full max-w-sm rounded-[2rem] sm:rounded-3xl border-2 border-cyan-500/30 p-6 sm:p-8 shadow-2xl relative text-center" onClick={e => e.stopPropagation()}>
                                <button className="absolute top-3 right-3 text-white/20 hover:text-white transition-colors" onClick={() => setTradeTarget(null)}><Icon name="X" size={20} className="sm:scale-125" /></button>
                                <Icon name="Trade" size={48} className="text-cyan-400 mx-auto mb-4 animate-pulse drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]" />
                                <h3 className="text-lg font-black uppercase mb-2 text-white">Dimensional Exchange</h3>
                                <p className="text-[10px] text-cyan-200/70 mb-6 uppercase font-black tracking-widest">Initiating link with <span className="text-cyan-400">{tradeTarget.username}</span>...</p>
                                <div className="bg-black/40 border border-white/5 rounded-2xl p-5 mb-6 shadow-inner">
                                    <p className="text-[9px] sm:text-[10px] uppercase font-black text-white/50 leading-relaxed">Trade module is spinning up.<br/><br/>You will be able to select items to offer and request from {tradeTarget.username}'s inventory in the next update!</p>
                                </div>
                                <button onClick={() => setTradeTarget(null)} className="w-full bg-cyan-600 text-white py-3 sm:py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-transform shadow-lg shadow-cyan-500/20">Close Uplink</button>
                            </div>
                        </div>
                    )}

                    {inventoryModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-950/90 backdrop-blur-md flex flex-col p-4 animate-in fade-in" onClick={() => setInventoryModal(null)}>
                            <div className="bg-slate-900 flex-1 rounded-3xl border border-white/10 p-4 flex flex-col overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4"><h3 className="text-xs font-black uppercase text-white tracking-[0.2em]">{inventoryModal === 'source' ? 'Select Material' : inventoryModal === 'pin' ? 'Select Item to Showcase' : 'Select Target'}</h3><button onClick={() => setInventoryModal(null)} className="p-1.5 bg-white/5 rounded-full"><Icon name="X" size={16} /></button></div>
                                <div className="flex-1 overflow-y-auto space-y-2 pr-1 scrollbar-hide">
                                    {activeInventory.filter(i => inventoryModal === 'source' ? (i.mutation && i.mutation !== 'none') : inventoryModal === 'pin' ? true : (i.id !== (transferSacrifice?.id || ''))).sort(sortItemsThemeAware).map(item => {
                                        const mData = getMutData(currentThemeId, item.mutation);
                                        return (
                                            <div key={item.id} onClick={() => { 
                                                if (inventoryModal === 'source') setTransferSacrifice(item); 
                                                else if (inventoryModal === 'pin') setPinnedItem(item);
                                                else setTransferTarget(item); 
                                                setInventoryModal(null); 
                                            }} className={`p-3 rounded-2xl flex justify-between items-center bg-white/5 border border-white/5 active:scale-95 cursor-pointer transition-all ${mData.glow}`}><div className="flex items-center gap-3"><span className="text-2xl">{getDbItem(item.name).e}</span><div><div className="text-[10px] font-black text-white">{item.name}</div><div className={`text-[8px] font-black uppercase tracking-wider ${item.mutation === 'none' ? 'text-white/50' : mData.color}`}>{mData.label || 'Base'} • {item.rarity?.label || 'Artifact'}</div></div></div></div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <div className="fixed inset-0 pointer-events-none z-[1000] border-[12px] sm:border-[16px] border-white/5 opacity-20" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
