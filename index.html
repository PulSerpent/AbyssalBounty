<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Abyssal Bounty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { overscroll-behavior-y: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; background-color: #020617; margin: 0; padding: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        .safe-pt { padding-top: var(--safe-top); }
        .safe-pb { padding-bottom: max(var(--safe-bottom), 1rem); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Core Game Constants (same as your previous logic)
        const RARITIES = [
            { id: 'trash', label: 'Trash', color: 'text-stone-500', bg: 'bg-stone-200/90', multiplier: 0.5, incomeBase: 0.02 },
            { id: 'common', label: 'Common', color: 'text-zinc-600', bg: 'bg-zinc-50/90', multiplier: 1, incomeBase: 0.1 },
            { id: 'uncommon', label: 'Uncommon', color: 'text-teal-500', bg: 'bg-teal-50/90', multiplier: 3, incomeBase: 0.5 },
            { id: 'rare', label: 'Rare', color: 'text-sky-500', bg: 'bg-sky-50/90', multiplier: 8, incomeBase: 2.5 },
            { id: 'epic', label: 'Epic', color: 'text-indigo-500', bg: 'bg-indigo-50/90', multiplier: 20, incomeBase: 12.0 },
            { id: 'legendary', label: 'Legendary', color: 'text-amber-500', bg: 'bg-amber-50/90', multiplier: 60, incomeBase: 60.0 },
            { id: 'mythic', label: 'Mythic', color: 'text-rose-500', bg: 'bg-rose-50/90', multiplier: 200, incomeBase: 250.0 },
            { id: 'celestial', label: 'Celestial', color: 'text-cyan-400', bg: 'bg-cyan-50/90', multiplier: 800, incomeBase: 1500.0 },
            { id: 'primordial', label: 'Primordial', color: 'text-fuchsia-600', bg: 'bg-fuchsia-50/90', multiplier: 3500, incomeBase: 10000.0 },
            { id: 'transcendent', label: 'Transcendent', color: 'text-yellow-300', bg: 'bg-slate-900/90', multiplier: 15000, incomeBase: 80000.0 },
        ];

        const MUTATIONS = {
            none: { label: '', mult: 1, color: 'text-slate-900', bg: 'bg-white/90', glow: '' },
            glimmering: { label: 'Glimmering', mult: 1.5, color: 'text-yellow-500', bg: 'bg-yellow-50/90', glow: 'shadow-[0_0_10px_rgba(234,179,8,0.3)]' },
            bioluminescent: { label: 'Bioluminescent', mult: 3, color: 'text-lime-500', bg: 'bg-lime-50/90', glow: 'shadow-[0_0_15px_rgba(132,204,22,0.4)]' },
            cursed: { label: 'Cursed', mult: 7, color: 'text-red-700', bg: 'bg-red-50/90', glow: 'shadow-[0_0_15px_rgba(185,28,28,0.5)]' },
            abyssal: { label: 'Abyssal', mult: 15, color: 'text-violet-700', bg: 'bg-violet-100/90', glow: 'shadow-[0_0_15px_rgba(109,40,217,0.4)]' },
            void_touched: { label: 'Void-Touched', mult: 35, color: 'text-slate-800', bg: 'bg-slate-300/90', glow: 'shadow-[0_0_20px_rgba(30,41,59,0.7)]' },
            prismatic: { label: 'Prismatic', mult: 100, color: 'text-fuchsia-500', bg: 'bg-fuchsia-50/90', glow: 'shadow-[0_0_20px_rgba(217,70,239,0.5)]' },
            ethereal: { label: 'Ethereal', mult: 500, color: 'text-cyan-200', bg: 'bg-white/95', glow: 'shadow-[0_0_30px_rgba(165,243,252,0.8)]' }
        };

        const MASTER_ITEM_DB = [
            { name: "Soggy Seaweed", rarityId: "trash" }, { name: "Waterlogged Boot", rarityId: "trash" },
            { name: "Soggy Driftwood", rarityId: "common" }, { name: "Barnacle Shell", rarityId: "common" },
            { name: "Shark Tooth", rarityId: "uncommon" }, { name: "Pearl Oyster", rarityId: "uncommon" },
            { name: "Glowing Urchin", rarityId: "rare" }, { name: "Pirate's Medallion", rarityId: "rare" },
            { name: "Kraken Tentacle", rarityId: "epic" }, { name: "Captain's Logbook", rarityId: "epic" },
            { name: "Heart of the Ocean", rarityId: "legendary" }, { name: "Sea Dragon Scale", rarityId: "legendary" },
            { name: "Leviathan Engine", rarityId: "mythic" }, { name: "Abyssal Pulse", rarityId: "mythic" },
            { name: "Stardust Coral", rarityId: "celestial" }, { name: "Zodiac Compass", rarityId: "celestial" },
            { name: "Genesis Drop", rarityId: "primordial" }, { name: "Core of the Earth", rarityId: "primordial" },
            { name: "Reality Shard", rarityId: "transcendent" }, { name: "The Infinite Ocean", rarityId: "transcendent" }
        ];

        const STANDARD_PACKS = [
            { id: 'flotsam', name: 'Flotsam Crate', cost: 0, currency: 'dubloon', weights: { trash: 70, common: 29.5, uncommon: 0.5 } },
            { id: 'sunken', name: 'Sunken Chest', cost: 5000, currency: 'dubloon', weights: { common: 30, uncommon: 50, rare: 18, epic: 2 } },
            { id: 'trench', name: 'Trench Cache', cost: 1500000, currency: 'dubloon', weights: { rare: 50, epic: 40, legendary: 9, mythic: 1 } },
            { id: 'atlantis', name: 'Atlantis Core', cost: 5000000000000, currency: 'dubloon', weights: { celestial: 50, primordial: 45, transcendent: 5 } },
        ];

        const MUTATION_PACKS = [
            { id: 'bio_pack', name: 'Bioluminescence', cost: 500, currency: 'pearl', mutation: 'bioluminescent', desc: 'Mutate (3x)' },
            { id: 'ethereal_pack', name: 'Ethereal Ascension', cost: 25000000, currency: 'pearl', mutation: 'ethereal', desc: 'Mutate (500x)' },
        ];

        const formatNum = (num) => {
            if (num < 1000) return Math.floor(num).toString();
            if (num < 1000000) return (num / 1000).toFixed(1) + 'k';
            if (num < 1000000000) return (num / 1000000).toFixed(1) + 'M';
            return (num / 1000000000).toFixed(1) + 'B';
        };

        const App = () => {
            const [dubloons, setDubloons] = React.useState(100);
            const [pearls, setPearls] = React.useState(0);
            const [inventory, setInventory] = React.useState([]);
            const [view, setView] = React.useState('shop');
            const [lastPull, setLastPull] = React.useState(null);

            // Simple income logic for demo
            React.useEffect(() => {
                const timer = setInterval(() => {
                    const income = inventory.reduce((acc, item) => acc + (item.cps * MUTATIONS[item.mutation || 'none'].mult), 0);
                    setDubloons(prev => prev + income / 10);
                }, 100);
                return () => clearInterval(timer);
            }, [inventory]);

            const openPack = (pack) => {
                if (pack.currency === 'dubloon' && dubloons < pack.cost) return;
                if (pack.currency === 'pearl' && pearls < pack.cost) return;
                
                if (pack.currency === 'dubloon') setDubloons(d => d - pack.cost);
                else setPearls(p => p - pack.cost);

                // Quick loot logic
                const rarityKeys = Object.keys(pack.weights);
                const selectedRarityId = rarityKeys[Math.floor(Math.random() * rarityKeys.length)];
                const rarity = RARITIES.find(r => r.id === selectedRarityId);
                const items = MASTER_ITEM_DB.filter(i => i.rarityId === selectedRarityId);
                const item = items[Math.floor(Math.random() * items.length)];

                const newItem = {
                    id: Date.now(),
                    name: item.name,
                    rarity: rarity,
                    mutation: pack.mutation || 'none',
                    cps: rarity.incomeBase,
                    value: Math.floor(rarity.incomeBase * 100),
                    currency: pack.currency
                };

                setInventory(prev => [newItem, ...prev]);
                setLastPull(newItem);
            };

            return (
                <div className="flex flex-col h-screen text-white overflow-hidden bg-slate-950 font-sans">
                    <nav className="p-4 bg-slate-900 border-b border-slate-800 safe-pt">
                        <div className="flex justify-between items-center max-w-md mx-auto">
                            <div>
                                <div className="text-amber-400 font-bold text-lg">{formatNum(dubloons)} D</div>
                                <div className="text-cyan-400 font-bold text-sm">{formatNum(pearls)} P</div>
                            </div>
                            <h1 className="text-xs font-black uppercase opacity-50 tracking-widest">Abyssal Bounty</h1>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto max-w-md mx-auto w-full p-4 no-scrollbar">
                        {view === 'shop' && (
                            <div className="grid grid-cols-2 gap-4">
                                {STANDARD_PACKS.map(pack => (
                                    <button key={pack.id} onClick={() => openPack(pack)} className="bg-slate-800 p-4 rounded-2xl border border-slate-700 active:scale-95 transition-all text-left">
                                        <div className="text-xs font-black uppercase mb-1 opacity-60">{pack.name}</div>
                                        <div className="text-sm font-bold text-amber-500">{formatNum(pack.cost)} Dubloons</div>
                                    </button>
                                ))}
                                {MUTATION_PACKS.map(pack => (
                                    <button key={pack.id} onClick={() => openPack(pack)} className="bg-indigo-900/30 p-4 rounded-2xl border border-indigo-800 active:scale-95 transition-all text-left">
                                        <div className="text-xs font-black uppercase mb-1 opacity-60">{pack.name}</div>
                                        <div className="text-sm font-bold text-cyan-400">{formatNum(pack.cost)} Pearls</div>
                                    </button>
                                ))}
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="space-y-3">
                                {inventory.map(item => (
                                    <div key={item.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                                        <div>
                                            <div className={`text-xs font-black uppercase ${item.rarity.color}`}>{item.rarity.label}</div>
                                            <div className="font-bold">{item.name}</div>
                                            {item.mutation !== 'none' && <div className="text-[10px] text-cyan-400 uppercase font-black">{item.mutation}</div>}
                                        </div>
                                        <div className="text-right text-xs font-bold text-teal-400">+{formatNum(item.cps * MUTATIONS[item.mutation].mult)}/s</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="p-4 bg-slate-900 border-t border-slate-800 safe-pb">
                        <div className="flex gap-4 max-w-md mx-auto">
                            <button onClick={() => setView('shop')} className={`flex-1 py-3 rounded-xl font-black uppercase text-xs ${view === 'shop' ? 'bg-white text-black' : 'bg-slate-800'}`}>Port</button>
                            <button onClick={() => setView('inventory')} className={`flex-1 py-3 rounded-xl font-black uppercase text-xs ${view === 'inventory' ? 'bg-white text-black' : 'bg-slate-800'}`}>Log ({inventory.length})</button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
